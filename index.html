<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ApartBook Pro</title>
<meta name="theme-color" content="#7c3aed"/>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#08080f;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
input,select,textarea,button{font-family:inherit;font-size:inherit}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.6)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#2a2a3d;border-radius:3px}
:root{--mc:#7c3aed;--mb:#1a1040;--md:rgba(124,58,237,.4)}
body.tm{--mc:#0ea5e9;--mb:#0d1f36;--md:rgba(14,165,233,.4)}
.hdr{background:#0c0c18;border-bottom:1px solid #1e1e2e;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;padding:0 10px;height:50px;gap:7px;border-bottom:1px solid #1e1e2e}
.hdr-tabs{display:flex;align-items:center;overflow-x:auto;padding:0 6px;height:38px;gap:1px;scrollbar-width:none}
.hdr-tabs::-webkit-scrollbar{display:none}
.tb{background:none;border:none;border-bottom:2px solid transparent;padding:7px 10px;font-size:11px;cursor:pointer;color:#64748b;white-space:nowrap;flex-shrink:0;height:100%}
.tb.active{border-bottom-color:var(--mc);color:var(--mc);font-weight:600}
.mt{display:flex;background:#111122;border:1px solid #2a2a3d;border-radius:8px;overflow:hidden;flex-shrink:0}
.mb{padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:#64748b}
.mb.ap{background:#1a1040;color:#9d65f5}
.mb.at{background:#0d1f36;color:#38bdf8}
.main{padding:14px 12px;max-width:980px;margin:0 auto}
.pg{font-size:17px;font-weight:600;margin-bottom:14px}
.card{background:#0f0f1c;border:1px solid #1e1e2e;border-radius:12px;padding:16px 18px;margin-bottom:14px}
.ct{font-size:14px;font-weight:600;margin-bottom:12px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.stat{background:#0f0f1c;border:1px solid #1e1e2e;border-radius:12px;padding:12px 14px}
.sl{font-size:10px;color:#64748b;margin-bottom:3px}
.sv{font-size:20px;font-weight:700}
.wide{grid-column:1/-1}
@media(min-width:500px){.stats{grid-template-columns:repeat(3,1fr)}}
label{font-size:12px;color:#64748b;display:block;margin-bottom:4px}
input,select,textarea{width:100%;background:#111122;border:1px solid #2a2a3d;border-radius:8px;color:#e2e8f0;padding:8px 12px;font-size:13px;margin-bottom:10px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--mc)}
textarea{resize:vertical;min-height:60px}
.fr{display:flex;gap:10px;flex-wrap:wrap}
.fc{flex:1;min-width:140px}
.btn{background:none;border:1px solid #2a2a3d;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;color:#e2e8f0}
.btnp{background:var(--mc);border:none;border-radius:8px;padding:9px 20px;cursor:pointer;font-size:13px;color:#fff;font-weight:500}
.btnd{background:none;border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;color:#ef4444}
.bg{background:#0d2d1a;border:1.5px solid rgba(34,197,94,.5);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:#22c55e;font-weight:500}
.br{background:#2d0d0d;border:1.5px solid rgba(239,68,68,.5);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:#ef4444;font-weight:500}
.bw{background:#0a2d1a;border:1.5px solid rgba(37,211,102,.4);border-radius:8px;padding:9px 14px;cursor:pointer;font-size:13px;color:#25d366;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-bottom:8px}
.tw{overflow-x:auto;border:1px solid #1e1e2e;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 11px;border-bottom:1px solid #1e1e2e;color:#64748b;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;background:#111122}
td{padding:10px 11px;border-bottom:1px solid #1e1e2e;vertical-align:middle}
tr:last-child td{border:none}
tbody tr:hover td{background:#111122;cursor:pointer}
#live-map{height:320px;border-radius:10px;border:1px solid #1e1e2e;z-index:1}
.mb2{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;padding:14px}
.mbox{background:#0f0f1c;border:1px solid #1e1e2e;border-radius:14px;padding:22px;max-width:490px;width:100%;max-height:90vh;overflow-y:auto}
.dr{display:flex;border-bottom:1px solid #1e1e2e;padding:8px 0;font-size:13px}
.dl{color:#64748b;width:120px;flex-shrink:0}
.em{color:#64748b;font-size:13px;padding:20px;text-align:center}
.er{font-size:12px;color:#ef4444;margin-bottom:8px;min-height:16px}
.ok{font-size:12px;color:#22c55e;margin-bottom:8px;min-height:16px}
.ib{background:var(--mb);border:1px solid var(--md);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px}
.sr{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sr input,.sr select{flex:1;min-width:140px;margin-bottom:0}
.bb{height:7px;background:#111122;border-radius:4px;overflow:hidden;margin-top:4px}
.bf{height:100%;border-radius:4px}
.li{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid #1e1e2e;cursor:pointer}
.li:last-child{border:none}
.pu{animation:pu-a 1.5s infinite}
@keyframes pu-a{0%,100%{opacity:1}50%{opacity:.3}}
.tk-w{overflow:hidden;border-radius:6px;padding:5px 8px;height:26px;display:flex;align-items:center}
@keyframes tk{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk{animation:tk 14s linear infinite;white-space:nowrap;display:inline-block}
.tk:hover{animation-play-state:paused}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.bdg{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:500;display:inline-block;white-space:nowrap}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#08080f;overflow:hidden;position:relative}
.lg{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.07) 0%,transparent 70%);pointer-events:none}
.lc{background:#0f0f1c;border:1px solid #1e1e2e;border-radius:16px;padding:28px 26px;box-shadow:0 24px 64px rgba(124,58,237,.15);width:100%;max-width:400px}
.pw{position:relative;margin-bottom:6px}
.pw input{margin-bottom:0;padding-right:46px}
.pwt{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;padding:0}
.bl{width:100%;padding:12px;font-size:14px;font-weight:600;border:none;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;cursor:pointer;margin-top:16px;box-shadow:0 4px 24px rgba(124,58,237,.4)}
.sp{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;background:#08080f}
.sp p{color:#64748b;font-size:14px}
.waf{position:fixed;bottom:18px;right:18px;width:48px;height:48px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:22px;z-index:200;box-shadow:0 4px 18px rgba(37,211,102,.5);text-decoration:none}
.dd{position:absolute;top:100%;left:0;right:0;background:#0f0f1c;border:1px solid #2a2a3d;border-top:none;border-radius:0 0 10px 10px;z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.6);display:none}
.ddi{padding:10px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid #1e1e2e;color:#e2e8f0}
.ddi:hover{background:#1a1a26}
.ddi:last-child{border:none}
</style>
</head>
<body>
<div id="app"><div class="sp"><p>Starting ApartBook Pro…</p></div></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
// ── FIREBASE CONFIG ──
firebase.initializeApp({
  apiKey:            "AIzaSyBX05w4u5H5l5ZBJlsai-Y2VarTL8R_l_U",
  authDomain:        "apartbook-pro-demo-e532a.firebaseapp.com",
  projectId:         "apartbook-pro-demo-e532a",
  storageBucket:     "apartbook-pro-demo-e532a.firebasestorage.app",
  messagingSenderId: "228723518944",
  appId:             "1:228723518944:web:aa28ff90ae8437b4628f85",
  databaseURL:       "https://apartbook-pro-demo-e532a-default-rtdb.europe-west1.firebasedatabase.app"
});

const PAYSTACK_KEY = "REPLACE_WITH_YOUR_PAYSTACK_KEY";
const SUPPORT_WA = "2348000000000";
const auth=firebase.auth();
const db=firebase.firestore();
const rtdb=firebase.database();
const TS=firebase.firestore.FieldValue.serverTimestamp;

// ── CONSTANTS ──
const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
const BS={Confirmed:{bg:"#0d2d1a",c:"#22c55e"},Pending:{bg:"#2d1f0d",c:"#f59e0b"},Cancelled:{bg:"#2d0d0d",c:"#ef4444"},"Checked-out":{bg:"#1a1040",c:"#a78bfa"}};
const RS={Pending:{bg:"#2d1f0d",c:"#f59e0b"},Active:{bg:"#0d2d1a",c:"#22c55e"},Completed:{bg:"#0d1f36",c:"#38bdf8"},Cancelled:{bg:"#2d0d0d",c:"#ef4444"}};
const DS={Online:{bg:"#0d2d1a",c:"#22c55e"},Offline:{bg:"#1a1a1a",c:"#64748b"},"On Ride":{bg:"#0d1f36",c:"#38bdf8"}};
const BSTAT=["Confirmed","Pending","Cancelled","Checked-out"];
const RSTAT=["Pending","Active","Completed","Cancelled"];
const DSTAT=["Online","Offline","On Ride"];
const ROLES=["admin","manager","staff","driver"];
const PC=[{c:"#7c3aed",b:"#1a1040"},{c:"#2563eb",b:"#0d1f4a"},{c:"#16a34a",b:"#0a2818"},{c:"#dc2626",b:"#2d0a0a"},{c:"#d97706",b:"#2d1a05"},{c:"#0891b2",b:"#062730"},{c:"#c026d3",b:"#2a0a2e"},{c:"#65a30d",b:"#1a2405"},{c:"#ea580c",b:"#2d1005"},{c:"#0d9488",b:"#062420"}];
const DU=[{id:"A1",name:"Garden Suite",floor:"Ground",beds:1,price:45000,colorIdx:0},{id:"A2",name:"City View Flat",floor:"1st",beds:2,price:65000,colorIdx:1},{id:"A3",name:"Executive Studio",floor:"2nd",beds:1,price:55000,colorIdx:2},{id:"A4",name:"Family Apartment",floor:"2nd",beds:3,price:85000,colorIdx:3},{id:"A5",name:"Deluxe Loft",floor:"3rd",beds:2,price:75000,colorIdx:4},{id:"A6",name:"Penthouse",floor:"Top",beds:4,price:150000,colorIdx:5}];
const DP={baseFare:500,perKm:120,perMinWaiting:25,minFare:800,nightSurcharge:1.5,airportFee:500,bookingFee:100};

// ── HELPERS ──
const fmt=n=>"₦"+Number(n).toLocaleString();
const nts=(a,b)=>Math.max(0,(new Date(b)-new Date(a))/86400000);
const ini=n=>(n||"?").split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();
const tod=()=>new Date().toISOString().split("T")[0];
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const wa=p=>{const d=String(p||"").replace(/\D/g,"");return d.startsWith("0")?"234"+d.slice(1):d.startsWith("234")?d:d;};
const ftm=t=>{if(!t)return"—";const[h,m]=t.split(":");const hh=Number(h);return(hh%12||12)+":"+m+" "+(hh<12?"AM":"PM");};
const nowt=()=>new Date().toTimeString().slice(0,5);
const pc=i=>PC[i%PC.length]||PC[0];
const isNt=()=>{const h=new Date().getHours();return h>=22||h<5;};
function calcFare(km,wait,p,night,airport){
  let f=p.baseFare+(km*p.perKm)+(wait*p.perMinWaiting)+p.bookingFee;
  if(airport)f+=p.airportFee;if(night)f*=p.nightSurcharge;
  return Math.max(f,p.minFare);
}
function distKm(la1,lo1,la2,lo2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── LOGOS ──
const LP=(sz=28)=>`<svg width="${sz}" height="${sz}" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="9" fill="#1a1040"/><rect x="1" y="1" width="34" height="34" rx="8.5" stroke="#7c3aed" stroke-opacity=".6"/><rect x="8" y="16" width="20" height="14" rx="1.5" fill="#2d1b69"/><rect x="8" y="16" width="20" height="14" rx="1.5" stroke="#7c3aed" stroke-width="1"/><path d="M6 17L18 7L30 17" stroke="#9d65f5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="14.5" y="22" width="7" height="8" rx="1" fill="#7c3aed" opacity=".7"/><rect x="9.5" y="19" width="4" height="3.5" rx=".7" fill="#c4b5fd" opacity=".6"/><rect x="22.5" y="19" width="4" height="3.5" rx=".7" fill="#c4b5fd" opacity=".6"/><circle cx="18" cy="11.5" r="1.2" fill="#c4b5fd"/></svg>`;
const LT=(sz=28)=>`<svg width="${sz}" height="${sz}" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="9" fill="#0d1f36"/><rect x="1" y="1" width="34" height="34" rx="8.5" stroke="#0ea5e9" stroke-opacity=".6"/><rect x="6" y="20" width="24" height="10" rx="2" fill="#0ea5e9" opacity=".2"/><rect x="6" y="20" width="24" height="10" rx="2" stroke="#0ea5e9"/><path d="M8 20L10 14Q11 12 13 12L23 12Q25 12 26 14L28 20" stroke="#0ea5e9" stroke-width="1.2" fill="none"/><circle cx="11" cy="30" r="2.5" fill="#0ea5e9"/><circle cx="25" cy="30" r="2.5" fill="#0ea5e9"/><rect x="14" y="14" width="8" height="5" rx="1" fill="#7dd3fc" opacity=".5"/><circle cx="26" cy="16" r="2" fill="#22c55e"/></svg>`;

// ── BADGE HELPERS ──
const bb=s=>{const c=BS[s]||{bg:"#111",c:"#64748b"};return`<span class="bdg" style="background:${c.bg};color:${c.c}">${esc(s)}</span>`;};
const rb=s=>{const c=RS[s]||{bg:"#111",c:"#64748b"};return`<span class="bdg" style="background:${c.bg};color:${c.c}">${esc(s)}</span>`;};
const db2=s=>{const c=DS[s]||DS.Offline;return`<span class="bdg" style="background:${c.bg};color:${c.c}">${esc(s)}</span>`;};
const pb=p=>`<span style="color:${p==="Paid"?"#22c55e":p==="Partial"?"#f59e0b":"#ef4444"};font-weight:500;font-size:12px">${esc(p||"Unpaid")}</span>`;
const av=(n,sz=30,bg="#1a1040",bd="#7c3aed44",cl="#9d65f5")=>`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.34}px;background:${bg};border:1.5px solid ${bd};color:${cl}">${ini(n)}</div>`;
const DR=(l,v)=>`<div class="dr"><span class="dl">${l}</span><div style="flex:1">${v}</div></div>`;

// ── STATE ──
const S={
  user:null,profile:null,mode:"property",tab:"Dashboard",
  props:[],selProp:null,bookings:[],
  rides:[],drivers:[],pricing:{...DP},
  staff:[],auditLog:[],
  search:"",fstat:"All",
  sel:null,editMode:false,editForm:null,delId:null,
  editingProp:null,
  rpm:new Date().getMonth(),rpy:new Date().getFullYear(),
  lerr:"",lbusy:false,showpw:false,
};
const isAdmin=()=>S.profile?.role==="admin";
const isMgr=()=>["admin","manager"].includes(S.profile?.role);
const isDrv=()=>S.profile?.role==="driver";
const curProp=()=>S.props.find(p=>p._id===S.selProp)||null;
const units=()=>curProp()?.units||[];
const gUnit=id=>units().find(u=>u.id===id)||null;
const occ=()=>{const t=tod();return new Set(S.bookings.filter(b=>b.checkIn<=t&&b.checkOut>t&&b.status==="Confirmed").map(b=>b.unitId));};
const bkd=()=>{const t=tod();return new Set(S.bookings.filter(b=>b.checkIn>t&&b.status==="Confirmed").map(b=>b.unitId));};

// ── AUTH ──
window.doLogin=async function(){
  const e=document.getElementById("lie")?.value?.trim();
  const p=document.getElementById("lip")?.value;
  if(!e||!p){S.lerr="Enter email and password.";render();return;}
  S.lbusy=true;S.lerr="";render();
  try{
    const c=await auth.signInWithEmailAndPassword(e,p);
    await db.collection("audit_log").add({userId:c.user.uid,email:c.user.email,action:"LOGIN",timestamp:TS(),device:navigator.userAgent.slice(0,100)});
  }catch(err){
    S.lerr=err.code?.includes("invalid")||err.code?.includes("wrong")?"Invalid email or password.":"Error: "+err.message;
    S.lbusy=false;render();
  }
};
window.doLogout=async function(){
  try{await db.collection("audit_log").add({userId:S.user.uid,email:S.user.email,action:"LOGOUT",timestamp:TS(),device:navigator.userAgent.slice(0,100)});}catch(_){}
  stopGPS();auth.signOut();
};
window.togglePw=function(){S.showpw=!S.showpw;render();};

// ── DATA ──
let bkUnsub=null,rdUnsub=null,auditUnsub=null,staffUnsub=null;
function loadProfile(){
  db.collection("users").doc(S.user.uid).onSnapshot(async snap=>{
    if(snap.exists){S.profile=snap.data();}
    else{
      const all=await db.collection("users").limit(1).get();
      const d={email:S.user.email,name:S.user.email.split("@")[0],role:all.empty?"admin":"staff",createdAt:TS()};
      await db.collection("users").doc(S.user.uid).set(d);S.profile=d;
    }
    if(isDrv()){S.mode="transport";document.body.className="tm";}
    render();
  });
}
function loadPricing(){
  db.collection("settings").doc("pricing").onSnapshot(snap=>{
    S.pricing=snap.exists?{...DP,...snap.data()}:{...DP};render();
  });
}
function loadProps(){
  db.collection("properties").orderBy("createdAt","asc").onSnapshot(async snap=>{
    const ps=snap.docs.map(d=>({...d.data(),_id:d.id}));
    if(ps.length===0){
      const r=await db.collection("properties").add({name:"Main Property",address:"",description:"",units:DU,createdAt:TS()});
      S.props=[{name:"Main Property",units:DU,_id:r.id}];S.selProp=r.id;
    }else{S.props=ps;if(!S.selProp)S.selProp=ps[0]._id;}
    loadBk();render();
  },()=>{});
}
function loadBk(){
  if(bkUnsub){bkUnsub();bkUnsub=null;}
  if(!S.selProp)return;
  bkUnsub=db.collection("bookings").where("propertyId","==",S.selProp).onSnapshot(snap=>{
    S.bookings=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.created?.seconds||0)-(a.created?.seconds||0));
    render();
  },()=>{db.collection("bookings").where("propertyId","==",S.selProp).get().then(snap=>{S.bookings=snap.docs.map(d=>({...d.data(),_id:d.id}));render();});});
}
function loadDrivers(){
  db.collection("drivers").onSnapshot(snap=>{S.drivers=snap.docs.map(d=>({...d.data(),_id:d.id}));render();},()=>{});
}
function loadRides(){
  if(rdUnsub){rdUnsub();rdUnsub=null;}
  rdUnsub=db.collection("rides").orderBy("created","desc").limit(200).onSnapshot(snap=>{
    S.rides=snap.docs.map(d=>({...d.data(),_id:d.id}));render();
  },()=>{db.collection("rides").get().then(snap=>{S.rides=snap.docs.map(d=>({...d.data(),_id:d.id}));render();});});
}

// ── GPS ──
let gpsW=null;
function startGPS(rideId){
  if(!navigator.geolocation){alert("GPS not available.");return;}
  S.isTracking=true;S.trackRide=rideId;

// ── MAP ──
let leafM=null,mMarkers={},rtdbLsn=null;
function destroyMap(){
  if(rtdbLsn){rtdb.ref("drivers_live").off("value",rtdbLsn);rtdbLsn=null;}
  Object.values(mMarkers).forEach(m=>{try{if(leafM)leafM.removeLayer(m);}catch(_){}});
  mMarkers={};
  if(leafM){try{leafM.remove();}catch(_){}leafM=null;}
}
function initMap(){
  const el=document.getElementById("live-map");if(!el)return;
  destroyMap();
  leafM=L.map("live-map",{zoomControl:true}).setView([6.5244,3.3792],12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(leafM);
  setTimeout(()=>{if(leafM)leafM.invalidateSize();},200);
  rtdbLsn=rtdb.ref("drivers_live").on("value",snap=>{
    Object.values(mMarkers).forEach(m=>{try{if(leafM)leafM.removeLayer(m);}catch(_){}});
    mMarkers={};
    Object.entries(snap.val()||{}).forEach(([uid,loc])=>{
      if(!loc.lat||!loc.lng||!leafM)return;
      const icon=L.divIcon({html:'<div style="background:#0ea5e9;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(14,165,233,.8)"></div>',iconSize:[14,14],className:""});
      mMarkers[uid]=L.marker([loc.lat,loc.lng],{icon}).bindPopup("🚗 "+(loc.name||"Driver")).addTo(leafM);
    });
  });
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{if(leafM)leafM.setView([p.coords.latitude,p.coords.longitude],13);},()=>{});
}

const lcT={};
window.locSearch=async function(inId,ddId){
  const inp=document.getElementById(inId);const dd=document.getElementById(ddId);
  if(!inp||!dd)return;
  const q=inp.value.trim();
  if(q.length<3){dd.innerHTML="";dd.style.display="none";return;}
  clearTimeout(lcT[inId]);
  lcT[inId]=setTimeout(async()=>{
    try{
      const url="https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(q)+"&format=json&limit=6&countrycodes=ng&addressdetails=1";
      const res=await fetch(url,{headers:{"Accept-Language":"en"}});
      const data=await res.json();
      if(!data.length){dd.innerHTML='<div class="ddi" style="color:#64748b">No locations found</div>';dd.style.display="block";return;}
      dd.innerHTML=data.map(r=>{
        const pts=[r.address?.road||r.address?.pedestrian,r.address?.suburb||r.address?.neighbourhood,r.address?.city||r.address?.town||r.address?.state_district,r.address?.state].filter(Boolean);
        const lbl=pts.length?pts.join(", "):r.display_name.split(",").slice(0,3).join(",");
        const city=[r.address?.city||r.address?.town,r.address?.state].filter(Boolean).join(", ");
        return '<div class="ddi" onclick="selLoc(\''+inId+'\',\''+ddId+'\',this.dataset.lbl)" data-lbl="'+lbl.replace(/"/g,"&quot;")+'"><div>📍 '+esc(lbl)+'</div>'+(city?'<div style="font-size:10px;color:#64748b;margin-top:2px">'+esc(city)+'</div>':'')+'</div>';
      }).join("");
      dd.style.display="block";
    }catch(_){dd.innerHTML="";dd.style.display="none";}
  },500);
};
window.selLoc=function(inId,ddId,lbl){
  const inp=document.getElementById(inId);if(inp)inp.value=lbl;
  const dd=document.getElementById(ddId);if(dd){dd.innerHTML="";dd.style.display="none";}

window.setMode=function(m){

};
window.goTo=function(t){

  if(t==="Audit"&&!auditUnsub)auditUnsub=db.collection("audit_log").orderBy("timestamp","desc").limit(150).onSnapshot(snap=>{S.auditLog=snap.docs.map(d=>({...d.data(),_id:d.id}));render();});

};

window.setDrvOnline=async function(status){
  const myDriver=S.drivers.find(d=>d.name===S.profile?.name||d.phone===S.profile?.phone);
  if(!myDriver){alert("Your driver profile is not set up. Ask admin to add you as a driver first.");return;}
  try{
    await db.collection("drivers").doc(myDriver._id).update({status:status==="online"?"Online":"Offline"});
    if(status==="online"&&!S.isTracking)startGPS("online-"+Date.now());
    if(status==="offline")stopGPS();
    render();
  }catch(e){alert("Error: "+e.message);}
};

window.drvStartRide=async function(id){
  try{
    await db.collection("rides").doc(id).update({status:"Active",startedAt:TS(),startTime:nowt(),startDate:tod()});
    if(S.sel?._id===id)S.sel={...S.sel,status:"Active"};
    if(!S.isTracking)startGPS(id);
    render();
  }catch(e){alert("Error: "+e.message);}
};
