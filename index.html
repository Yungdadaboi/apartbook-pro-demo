<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ApartBook Pro</title>
<meta name="theme-color" content="#7c3aed"/>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="ApartBook Pro"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#08080f;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
input,select,textarea,button{font-family:inherit;font-size:inherit}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.6)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#2a2a3d;border-radius:3px}

/* ── MODE COLORS ── */
/* Property: purple #7c3aed */
/* Transport: sky #0ea5e9  */
:root{
  --mode-clr:#7c3aed;
  --mode-bg:#1a1040;
  --mode-brd:rgba(124,58,237,.4);
}
body.transport-mode{
  --mode-clr:#0ea5e9;
  --mode-bg:#0d1f36;
  --mode-brd:rgba(14,165,233,.4);
}

/* ── LAYOUT ── */
.hdr{background:#0c0c18;border-bottom:1px solid #1e1e2e;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;padding:0 10px;height:50px;gap:7px;border-bottom:1px solid #1e1e2e}
.hdr-tabs{display:flex;align-items:center;overflow-x:auto;padding:0 6px;height:38px;gap:1px;scrollbar-width:none}
.hdr-tabs::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:7px 10px;font-size:11px;cursor:pointer;color:#64748b;white-space:nowrap;flex-shrink:0;height:100%;transition:color .15s}
.tab-btn.active{border-bottom-color:var(--mode-clr);color:var(--mode-clr);font-weight:600}
.tab-btn:hover{color:#e2e8f0}
.mode-toggle{display:flex;background:#111122;border:1px solid #2a2a3d;border-radius:8px;overflow:hidden;flex-shrink:0}
.mode-btn{padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:#64748b;transition:.2s;white-space:nowrap}
.mode-btn.active-prop{background:#1a1040;color:#9d65f5}
.mode-btn.active-trans{background:#0d1f36;color:#38bdf8}
.main{padding:14px 12px;max-width:980px;margin:0 auto}
.pg-title{font-size:17px;font-weight:600;margin-bottom:14px}

/* ── CARDS ── */
.card{background:#0f0f1c;border:1px solid #1e1e2e;border-radius:12px;padding:16px 18px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px;color:#e2e8f0}
.card.prop-accent{border-color:rgba(124,58,237,.35)}
.card.trans-accent{border-color:rgba(14,165,233,.35)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.stat{background:#0f0f1c;border:1px solid #1e1e2e;border-radius:12px;padding:12px 14px}
.stat-l{font-size:10px;color:#64748b;margin-bottom:3px}
.stat-v{font-size:20px;font-weight:700}
.stat.wide{grid-column:1/-1}
@media(min-width:500px){.stats{grid-template-columns:repeat(3,1fr)}}

/* ── FORMS ── */
label{font-size:12px;color:#64748b;display:block;margin-bottom:4px}
input,select,textarea{width:100%;background:#111122;border:1px solid #2a2a3d;border-radius:8px;color:#e2e8f0;padding:8px 12px;font-size:13px;margin-bottom:10px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--mode-clr)}
textarea{resize:vertical;min-height:60px}
.frow{display:flex;gap:10px;flex-wrap:wrap}
.fcol{flex:1;min-width:140px}

/* ── BUTTONS ── */
.btn{background:none;border:1px solid #2a2a3d;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;color:#e2e8f0}
.btn:hover{border-color:var(--mode-clr);color:var(--mode-clr)}
.btnp{background:var(--mode-clr);border:none;border-radius:8px;padding:9px 20px;cursor:pointer;font-size:13px;color:#fff;font-weight:500}
.btnd{background:none;border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;color:#ef4444}
.btn-grn{background:#0d2d1a;border:1.5px solid rgba(34,197,94,.5);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:#22c55e;font-weight:500}
.btn-red{background:#2d0d0d;border:1.5px solid rgba(239,68,68,.5);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:#ef4444;font-weight:500}
.btn-wa{background:#0a2d1a;border:1.5px solid rgba(37,211,102,.4);border-radius:8px;padding:9px 14px;cursor:pointer;font-size:13px;color:#25d366;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-bottom:8px}

/* ── TABLE ── */
.tblw{overflow-x:auto;border:1px solid #1e1e2e;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 11px;border-bottom:1px solid #1e1e2e;color:#64748b;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;background:#111122}
td{padding:10px 11px;border-bottom:1px solid #1e1e2e;vertical-align:middle}
tr:last-child td{border:none}
tbody tr:hover td{background:#111122;cursor:pointer}

/* ── MAP ── */
#live-map{height:320px;border-radius:10px;border:1px solid #1e1e2e;z-index:1}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;padding:14px}
.modal-box{background:#0f0f1c;border:1px solid #1e1e2e;border-radius:14px;padding:22px;max-width:490px;width:100%;max-height:90vh;overflow-y:auto}
.dr{display:flex;border-bottom:1px solid #1e1e2e;padding:8px 0;font-size:13px}
.dl{color:#64748b;width:120px;flex-shrink:0}

/* ── MISC ── */
.empty{color:#64748b;font-size:13px;padding:20px;text-align:center}
.err{font-size:12px;color:#ef4444;margin-bottom:8px;min-height:16px}
.ok{font-size:12px;color:#22c55e;margin-bottom:8px;min-height:16px}
.info-box{background:var(--mode-bg);border:1px solid var(--mode-brd);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px}
.search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-row input,.search-row select{flex:1;min-width:140px;margin-bottom:0}
.bar-bg{height:7px;background:#111122;border-radius:4px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:4px}
.list-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid #1e1e2e;cursor:pointer}
.list-item:last-child{border:none}
.pulse{animation:pulse-a 1.5s infinite}
@keyframes pulse-a{0%,100%{opacity:1}50%{opacity:.3}}
.ticker-wrap{overflow:hidden;border-radius:6px;padding:5px 8px;height:26px;display:flex;align-items:center}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker{animation:ticker 14s linear infinite;white-space:nowrap;display:inline-block}
.ticker:hover{animation-play-state:paused}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.badge{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:500;display:inline-block;white-space:nowrap}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#08080f;overflow:hidden;position:relative}
.login-glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.07) 0%,transparent 70%);pointer-events:none}
.login-card{background:#0f0f1c;border:1px solid #1e1e2e;border-radius:16px;padding:28px 26px;box-shadow:0 24px 64px rgba(124,58,237,.15);width:100%;max-width:400px}
.pw-wrap{position:relative;margin-bottom:6px}
.pw-wrap input{margin-bottom:0;padding-right:46px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;padding:0}
.btn-login{width:100%;padding:12px;font-size:14px;font-weight:600;border:none;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;cursor:pointer;margin-top:16px;box-shadow:0 4px 24px rgba(124,58,237,.4)}
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;background:#08080f}
.splash p{color:#64748b;font-size:14px}
.wa-float{position:fixed;bottom:18px;right:18px;width:48px;height:48px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:22px;z-index:200;box-shadow:0 4px 18px rgba(37,211,102,.5);text-decoration:none}
</style>
</head>
<body>
<div id="app"><div class="splash"><p>Starting ApartBook Pro…</p></div></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
// ════════════════════════════════════════════════════
//  FIREBASE CONFIG — PASTE YOUR VALUES HERE
// ════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:            "REPLACE_WITH_YOUR_API_KEY",
  authDomain:        "REPLACE_WITH_YOUR_AUTH_DOMAIN",
  projectId:         "REPLACE_WITH_YOUR_PROJECT_ID",
  storageBucket:     "REPLACE_WITH_YOUR_STORAGE_BUCKET",
  messagingSenderId: "REPLACE_WITH_YOUR_SENDER_ID",
  appId:             "REPLACE_WITH_YOUR_APP_ID",
  databaseURL:       "REPLACE_WITH_YOUR_DATABASE_URL"
});

// PAYSTACK KEY
const PAYSTACK_KEY = "REPLACE_WITH_YOUR_PAYSTACK_PUBLIC_KEY";

// SUPPORT WHATSAPP
const SUPPORT_WA = "2348000000000";

const auth = firebase.auth();
const db   = firebase.firestore();
const rtdb = firebase.database();
const TS   = firebase.firestore.FieldValue.serverTimestamp;

// ════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════
const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
const BOOK_STATUSES=["Confirmed","Pending","Cancelled","Checked-out"];
const RIDE_STATUSES=["Pending","Active","Completed","Cancelled"];
const DRIVER_STATUSES=["Online","Offline","On Ride"];
const ROLES=["admin","manager","staff","driver"];

const PROP_CLRS=[
  {c:"#7c3aed",b:"#1a1040"},{c:"#2563eb",b:"#0d1f4a"},
  {c:"#16a34a",b:"#0a2818"},{c:"#dc2626",b:"#2d0a0a"},
  {c:"#d97706",b:"#2d1a05"},{c:"#0891b2",b:"#062730"},
  {c:"#c026d3",b:"#2a0a2e"},{c:"#65a30d",b:"#1a2405"},
  {c:"#ea580c",b:"#2d1005"},{c:"#0d9488",b:"#062420"},
];

const DEFAULT_PROP_UNITS=[
  {id:"A1",name:"Garden Suite",    floor:"Ground",beds:1,price:45000, colorIdx:0},
  {id:"A2",name:"City View Flat",  floor:"1st",   beds:2,price:65000, colorIdx:1},
  {id:"A3",name:"Executive Studio",floor:"2nd",   beds:1,price:55000, colorIdx:2},
  {id:"A4",name:"Family Apartment",floor:"2nd",   beds:3,price:85000, colorIdx:3},
  {id:"A5",name:"Deluxe Loft",     floor:"3rd",   beds:2,price:75000, colorIdx:4},
  {id:"A6",name:"Penthouse",       floor:"Top",   beds:4,price:150000,colorIdx:5},
];

const DEFAULT_PRICING={
  baseFare:500, perKm:120, perMinWaiting:25,
  minFare:800,  nightSurcharge:1.5,
  airportFee:500, bookingFee:100,
};

const BS={
  Confirmed:   {bg:"#0d2d1a",c:"#22c55e"},
  Pending:     {bg:"#2d1f0d",c:"#f59e0b"},
  Cancelled:   {bg:"#2d0d0d",c:"#ef4444"},
  "Checked-out":{bg:"#1a1040",c:"#a78bfa"},
};
const RS={
  Pending:  {bg:"#2d1f0d",c:"#f59e0b"},
  Active:   {bg:"#0d2d1a",c:"#22c55e"},
  Completed:{bg:"#0d1f36",c:"#38bdf8"},
  Cancelled:{bg:"#2d0d0d",c:"#ef4444"},
};
const DS={
  Online:   {bg:"#0d2d1a",c:"#22c55e"},
  Offline:  {bg:"#1a1a1a",c:"#64748b"},
  "On Ride":{bg:"#0d1f36",c:"#38bdf8"},
};

// ════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════
const fmt   = n  => "₦"+Number(n).toLocaleString();
const nts   = (a,b)=> Math.max(0,(new Date(b)-new Date(a))/86400000);
const ini   = n  => (n||"?").split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();
const tod   = () => new Date().toISOString().split("T")[0];
const esc   = s  => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtWA = p  => {const d=String(p||"").replace(/\D/g,"");return d.startsWith("0")?"234"+d.slice(1):d.startsWith("234")?d:d;};
const fmtT  = t  => {if(!t)return"—";const[h,m]=t.split(":");const hh=Number(h);return`${hh%12||12}:${m} ${hh<12?"AM":"PM"}`;};
const nowT  = () => new Date().toTimeString().slice(0,5);
const propClr = i=> PROP_CLRS[i%PROP_CLRS.length]||PROP_CLRS[0];

function distKm(lat1,lon1,lat2,lon2){
  const R=6371,dL=(lat2-lat1)*Math.PI/180,dl=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcFare(km,wait,p,night=false,airport=false){
  let f=p.baseFare+(km*p.perKm)+(wait*p.perMinWaiting)+p.bookingFee;
  if(airport)f+=p.airportFee;
  if(night)f*=p.nightSurcharge;
  return Math.max(f,p.minFare);
}
const isNight=()=>{const h=new Date().getHours();return h>=22||h<5;};

// ════════════════════════════════════════════════════
//  APP STATE
// ════════════════════════════════════════════════════
const S={
  user:null, profile:null,
  mode:"property",   // "property" | "transport"
  tab:"Dashboard",

  // Property
  properties:[], selProp:null,
  bookings:[],

  // Transport
  rides:[], drivers:[],
  pricing:{...DEFAULT_PRICING},
  gpsWatcher:null, isTracking:false, trackingRideId:null,

  // Shared
  staff:[], auditLog:[],

  // UI
  search:"", filterStatus:"All",
  sel:null, editMode:false, editForm:null,
  delId:null,
  reportMonth:new Date().getMonth(),
  reportYear:new Date().getFullYear(),
  loginErr:"", loginBusy:false, showPw:false,
};

const isAdmin = ()=>S.profile?.role==="admin";
const isMgr   = ()=>["admin","manager"].includes(S.profile?.role);
const isDriver= ()=>S.profile?.role==="driver";

// ════════════════════════════════════════════════════
//  LOGO
// ════════════════════════════════════════════════════
const LOGO_PROP=(sz=30)=>`<svg width="${sz}" height="${sz}" viewBox="0 0 36 36" fill="none">
  <rect width="36" height="36" rx="9" fill="#1a1040"/>
  <rect x="1" y="1" width="34" height="34" rx="8.5" stroke="#7c3aed" stroke-opacity=".6"/>
  <rect x="8" y="16" width="20" height="14" rx="1.5" fill="#2d1b69"/>
  <rect x="8" y="16" width="20" height="14" rx="1.5" stroke="#7c3aed" stroke-width="1"/>
  <path d="M6 17L18 7L30 17" stroke="#9d65f5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="14.5" y="22" width="7" height="8" rx="1" fill="#7c3aed" opacity=".7"/>
  <rect x="9.5" y="19" width="4" height="3.5" rx=".7" fill="#c4b5fd" opacity=".6"/>
  <rect x="22.5" y="19" width="4" height="3.5" rx=".7" fill="#c4b5fd" opacity=".6"/>
  <circle cx="18" cy="11.5" r="1.2" fill="#c4b5fd"/>
</svg>`;

const LOGO_TRANS=(sz=30)=>`<svg width="${sz}" height="${sz}" viewBox="0 0 36 36" fill="none">
  <rect width="36" height="36" rx="9" fill="#0d1f36"/>
  <rect x="1" y="1" width="34" height="34" rx="8.5" stroke="#0ea5e9" stroke-opacity=".6"/>
  <rect x="6" y="20" width="24" height="10" rx="2" fill="#0ea5e9" opacity=".2"/>
  <rect x="6" y="20" width="24" height="10" rx="2" stroke="#0ea5e9"/>
  <path d="M8 20 L10 14 Q11 12 13 12 L23 12 Q25 12 26 14 L28 20" stroke="#0ea5e9" stroke-width="1.2" fill="none"/>
  <circle cx="11" cy="30" r="2.5" fill="#0ea5e9"/>
  <circle cx="25" cy="30" r="2.5" fill="#0ea5e9"/>
  <rect x="14" y="14" width="8" height="5" rx="1" fill="#7dd3fc" opacity=".5"/>
  <circle cx="26" cy="16" r="2" fill="#22c55e"/>
</svg>`;

// ════════════════════════════════════════════════════
//  UI BADGE HELPERS
// ════════════════════════════════════════════════════
const bookBadge = s=>{const c=BS[s]||{bg:"#1a1a1a",c:"#64748b"};return`<span class="badge" style="background:${c.bg};color:${c.c}">${esc(s)}</span>`;};
const rideBadge = s=>{const c=RS[s]||{bg:"#1a1a1a",c:"#64748b"};return`<span class="badge" style="background:${c.bg};color:${c.c}">${esc(s)}</span>`;};
const drvBadge  = s=>{const c=DS[s]||DS.Offline;return`<span class="badge" style="background:${c.bg};color:${c.c}">${esc(s)}</span>`;};
const payBadge  = p=>`<span style="color:${p==="Paid"?"#22c55e":p==="Partial"?"#f59e0b":"#ef4444"};font-weight:500;font-size:12px">${esc(p||"Unpaid")}</span>`;
const av        = (n,sz=30,bg="#1a1040",brd="#7c3aed44",col="#9d65f5")=>`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.34}px;background:${bg};border:1.5px solid ${brd};color:${col}">${ini(n)}</div>`;
const DR        = (l,v)=>`<div class="dr"><span class="dl">${l}</span><div style="flex:1">${v}</div></div>`;

// ════════════════════════════════════════════════════
//  AUTH ACTIONS
// ════════════════════════════════════════════════════
window.doLogin=async function(){
  const email=document.getElementById("li-email")?.value?.trim();
  const pass=document.getElementById("li-pass")?.value;
  if(!email||!pass){S.loginErr="Please enter email and password.";render();return;}
  S.loginBusy=true;S.loginErr="";render();
  try{
    const cred=await auth.signInWithEmailAndPassword(email,pass);
    await db.collection("audit_log").add({userId:cred.user.uid,email:cred.user.email,action:"LOGIN",timestamp:TS(),device:navigator.userAgent.slice(0,100)});
  }catch(e){
    S.loginErr=e.code?.includes("invalid")||e.code?.includes("wrong")?"Invalid email or password.":"Error: "+e.message;
    S.loginBusy=false;render();
  }
};

window.doLogout=async function(){
  try{await db.collection("audit_log").add({userId:S.user.uid,email:S.user.email,action:"LOGOUT",timestamp:TS(),device:navigator.userAgent.slice(0,100)});}catch(_){}
  stopGPS();auth.signOut();
};

// ════════════════════════════════════════════════════
//  DATA LOADING
// ════════════════════════════════════════════════════
let bkUnsub=null,rideUnsub=null,auditUnsub=null,staffUnsub=null;

function loadProfile(){
  db.collection("users").doc(S.user.uid).onSnapshot(async snap=>{
    if(snap.exists){S.profile=snap.data();}
    else{
      const all=await db.collection("users").limit(1).get();
      const d={email:S.user.email,name:S.user.email.split("@")[0],role:all.empty?"admin":"staff",createdAt:TS()};
      await db.collection("users").doc(S.user.uid).set(d);S.profile=d;
    }
    // Set initial mode based on role
    if(S.profile?.role==="driver"){S.mode="transport";S.tab="Dashboard";}
    render();
  });
}

function loadPricing(){
  db.collection("settings").doc("pricing").onSnapshot(snap=>{
    S.pricing=snap.exists?{...DEFAULT_PRICING,...snap.data()}:{...DEFAULT_PRICING};

function loadProperties(){

function startGPS(rideId){
  if(!navigator.geolocation){alert("GPS not available.");return;}
  S.trackingRideId=rideId;S.isTracking=true;
  S.gpsWatcher=navigator.geolocation.watchPosition(async pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    try{await rtdb.ref(`drivers_live/${S.user.uid}`).set({lat,lng,speed:pos.coords.speed||0,rideId,timestamp:Date.now(),name:S.profile?.name||S.user.email});}catch(_){}
    render();
  },{enableHighAccuracy:true,maximumAge:3000,timeout:10000});
}

function stopGPS(){
  if(S.gpsWatcher!=null){navigator.geolocation.clearWatch(S.gpsWatcher);S.gpsWatcher=null;}
  if(S.user)rtdb.ref(`drivers_live/${S.user.uid}`).remove().catch(()=>{});
  S.isTracking=false;S.trackingRideId=null;
}

  const night=isNight();
  const fare=Math.round(calcFare(km,wait,S.pricing,night,ride.isAirport));

function downloadCSV(rows,filename){
  const csv=rows.map(r=>r.map(c=>{const s=String(c==null?"":c).replace(/"/g,'""');return s.includes(",")||s.includes("\n")||s.includes('"')?`"${s}"`:s;}).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

    doc.autoTable({startY:y2+4,theme:"striped",head:[["Passenger","Driver","Pickup","Dropoff","Km","Status","Fare"]],body:mb.length?mb.map(r=>[r.passenger||"—",r.driverName||"—",(r.pickup||"—").slice(0,18),(r.dropoff||"—").slice(0,18),(r.distanceKm||0).toFixed(1),r.status||"—",pfmt(r.fare||0)]):[["No rides","","","","","",""]],headStyles:{fillColor:[14,165,233],textColor:255,fontSize:8},styles:{fontSize:7.5}});
    doc.save(`ApartBook-Transport-${MN[S.reportMonth]}-${S.reportYear}.pdf`);

};

let leafMap=null,mapMarkers={},rtdbMapListener=null;

function destroyMap(){
  // remove rtdb listener
  if(rtdbMapListener){rtdb.ref("drivers_live").off("value",rtdbMapListener);rtdbMapListener=null;}
  // remove all markers
  Object.values(mapMarkers).forEach(m=>{try{if(leafMap)leafMap.removeLayer(m);}catch(_){}});
  mapMarkers={};
  // fully destroy leaflet instance so it can be recreated fresh
  if(leafMap){try{leafMap.remove();}catch(_){}leafMap=null;}
}

function initMap(){
  const el=document.getElementById("live-map");
  if(!el)return;
  // always destroy first to avoid "container already initialised" error
  destroyMap();
  leafMap=L.map("live-map",{zoomControl:true}).setView([6.5244,3.3792],12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(leafMap);
  // force correct size after DOM settles
  setTimeout(()=>{if(leafMap)leafMap.invalidateSize();},200);
  // live driver tracking
  rtdbMapListener=rtdb.ref("drivers_live").on("value",snap=>{
    Object.values(mapMarkers).forEach(m=>{try{if(leafMap)leafMap.removeLayer(m);}catch(_){}});
    mapMarkers={};
    const data=snap.val()||{};
    Object.entries(data).forEach(([uid,loc])=>{
      if(!loc.lat||!loc.lng||!leafMap)return;
      const icon=L.divIcon({html:`<div style="background:#0ea5e9;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(14,165,233,.8)"></div>`,iconSize:[14,14],className:""});
      mapMarkers[uid]=L.marker([loc.lat,loc.lng],{icon}).bindPopup(`🚗 ${esc(loc.name||"Driver")}`).addTo(leafMap);
    });
  });
  // center on user location
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=>{
      if(leafMap)leafMap.setView([p.coords.latitude,p.coords.longitude],13);
    },()=>{});
  }
}

function renderNewBooking(){
  if(!isMgr())return`<div class="empty">Manager access required.</div>`;

  const times=["06:00","07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00"];

  <div class="pg-title">New Reservation — ${esc(curProp()?.name||"")}</div>

    <div class="frow">

      ${units.map(u=>{const c=propClr(u.colorIdx||0);const isOcc=occ.has(u.id);const isBkd=!isOcc&&booked.has(u.id);const upBk=S.bookings.find(b=>b.unitId===u.id&&b.checkIn>t&&b.status==="Confirmed");
      return`<div onclick="${isOcc?"":`document.getElementById('b-unit').value='${u.id}';refreshTotal();document.querySelectorAll('.ucard').forEach(x=>{x.style.borderColor='#2a2a3d';x.style.background='#111122'});this.style.borderColor='${c.c}';this.style.background='${c.b}';`}"

        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:13px;font-weight:600;color:${isOcc?"#ef4444":isBkd?"#f59e0b":c.c}">${esc(u.name)}</div>
            <div style="font-size:11px;color:#64748b;margin-top:2px">${u.floor?u.floor+" · ":""}${u.beds} bed${u.beds!==1?"s":""} · ${fmt(u.price)}/night</div>
            ${isBkd&&upBk?`<div style="font-size:10px;color:#f59e0b;margin-top:2px">📅 ${esc(upBk.guest)} · ${upBk.checkIn} → ${upBk.checkOut}</div>`:""}
            ${isOcc?`<div style="font-size:10px;color:#ef4444;margin-top:2px">⛔ Currently occupied — cannot book</div>`:""}
          </div>

        </div>
      </div>`;}).join("")}
      ${units.length===0?`<div style="color:#64748b;font-size:13px">No units. Add them in Properties tab first.</div>`:""}
    </div>
    <select id="b-unit" style="display:none"><option value="">—</option>${units.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join("")}</select>
    <div class="frow">
      <div class="fcol"><label>Check-in date *</label><input id="b-cin" type="date" onchange="refreshTotal()"/></div>
      <div class="fcol"><label>Check-in time ⏰</label><select id="b-cintime"><option value="">— Time —</option>${times.map(t=>`<option value="${t}">${tfmt(t)}</option>`).join("")}</select></div>
    </div>
    <div class="frow">
      <div class="fcol"><label>Check-out date *</label><input id="b-cout" type="date" onchange="refreshTotal()"/></div>
      <div class="fcol"><label>Check-out time ⏰</label><select id="b-couttime"><option value="">— Time —</option>${times.map(t=>`<option value="${t}">${tfmt(t)}</option>`).join("")}</select></div>
    </div>
    <div class="frow">
      <div class="fcol"><label>Status</label><select id="b-status">${BOOK_STATUSES.map(s=>`<option>${s}</option>`).join("")}</select></div>

// ════════════════════════════════════════════════════
//  ─── RENDER: CUSTOMERS ───
// ════════════════════════════════════════════════════
function renderCustomers(){
  if(!isMgr())return`<div class="empty">Manager access required.</div>`;
  const m={};S.bookings.forEach(b=>{if(!m[b.email||b.phone||b.guest])m[b.email||b.phone||b.guest]={guest:b.guest,email:b.email,phone:b.phone,bookings:[]};m[b.email||b.phone||b.guest].bookings.push(b);});
  const cust=Object.values(m).sort((a,b)=>b.bookings.length-a.bookings.length);
  return`
  <div class="pg-title">Customer Records <span style="color:#64748b;font-size:13px;font-weight:400">(${cust.length})</span></div>
  ${cust.length===0?`<div class="card"><div class="empty">No customers yet.</div></div>`:""}
  ${cust.map(c=>{const spent=c.bookings.filter(b=>b.payment==="Paid").reduce((s,b)=>s+nts(b.checkIn,b.checkOut)*(getUnit(b.unitId)?.price||0),0);const phone=fmtWA(c.phone||"");
  return`<div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      ${av(c.guest,42)}
      <div style="flex:1"><div style="font-weight:500">${esc(c.guest)}</div><div style="font-size:12px;color:#64748b">${esc(c.email||"—")}${c.phone?` · ${esc(c.phone)}`:""}</div></div>
      <div style="text-align:right"><div style="font-size:12px;color:#64748b">${c.bookings.length} booking${c.bookings.length!==1?"s":""}</div>${spent>0?`<div style="font-size:12px;color:#22c55e;font-weight:500">${fmt(spent)} paid</div>`:""}</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:${phone.length>=10?"10px":"0"}">
      ${c.bookings.map(b=>{const u=getUnit(b.unitId);const cl=u?propClr(u.colorIdx||0):PROP_CLRS[0];return`<div onclick="openSel('${b._id}');goTo('Bookings')" style="display:flex;align-items:center;gap:5px;font-size:11px;background:#111122;border-radius:7px;padding:5px 9px;cursor:pointer;border:1px solid #1e1e2e">
        <span class="badge" style="background:${cl.b};color:${cl.c};font-size:10px">${esc(u?.name||"—")}</span><span style="color:#64748b">${b.checkIn}–${b.checkOut}</span>${bookBadge(b.status)}
      </div>`;}).join("")}
    </div>
    ${phone.length>=10?`<button class="btn-wa" onclick="window.open('https://wa.me/${phone}','_blank')">💬 WhatsApp ${esc(c.guest.split(" ")[0])}</button>`:""}
  </div>`;}).join("")}`;
}

// ════════════════════════════════════════════════════
//  ─── RENDER: CALENDAR ───
// ════════════════════════════════════════════════════
function renderCalendar(){
  const y=S.reportYear,m=S.reportMonth;
  const first=new Date(y,m,1).getDay();const days=new Date(y,m+1,0).getDate();const t=tod();
  const ds=d=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const bfd=d=>S.bookings.filter(b=>{const s=ds(d);return b.checkIn<=s&&b.checkOut>s&&b.status!=="Cancelled";});
  const units=allUnits();
  return`
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn" onclick="if(S.reportMonth===0){S.reportMonth=11;S.reportYear--;}else S.reportMonth--;render()">← Prev</button>
    <div style="font-size:17px;font-weight:600">${MN[m]} ${y}</div>
    <button class="btn" onclick="if(S.reportMonth===11){S.reportMonth=0;S.reportYear++;}else S.reportMonth++;render()">Next →</button>
  </div>
  <div class="card">
    <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;margin-bottom:5px">
      ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div style="font-size:11px;color:#64748b;text-align:center;padding:4px 0">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px">
      ${Array(first).fill(0).map(()=>"<div></div>").join("")}
      ${Array.from({length:days},(_,i)=>i+1).map(day=>{
        const bks=bfd(day);const isT=ds(day)===t;
        return`<div style="min-height:56px;border:${isT?`1.5px solid #7c3aed`:`1px solid #1e1e2e`};border-radius:7px;padding:3px 5px;background:${bks.length?"#1a1040":"#111122"}">
          <div style="font-size:11px;font-weight:${isT?600:400};color:${isT?"#9d65f5":"#64748b"};margin-bottom:2px">${day}</div>
          ${bks.slice(0,2).map(b=>{const u=getUnit(b.unitId);const c=u?propClr(u.colorIdx||0):PROP_CLRS[0];return`<div style="font-size:9px;background:${c.c};color:#fff;border-radius:3px;padding:1px 4px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(u?.name?.split(" ")[0]||"—")}</div>`;}).join("")}
          ${bks.length>2?`<div style="font-size:9px;color:#9d65f5">+${bks.length-2}</div>`:""}
        </div>`;

function renderPropReports(){
  if(!isMgr())return`<div class="empty">Manager access required.</div>`;
  const units=allUnits();
  const mb=S.bookings.filter(b=>{const d=new Date(b.checkIn);return d.getMonth()===S.reportMonth&&d.getFullYear()===S.reportYear;});
  const rev=mb.filter(b=>b.payment==="Paid").reduce((s,b)=>s+(getUnit(b.unitId)?.price||0)*nts(b.checkIn,b.checkOut),0);
  const totalRev=S.bookings.filter(b=>b.payment==="Paid").reduce((s,b)=>s+(getUnit(b.unitId)?.price||0)*nts(b.checkIn,b.checkOut),0);
  const maxR=Math.max(...units.map(u=>S.bookings.filter(b=>b.unitId===u.id&&b.payment==="Paid").reduce((s,b)=>s+nts(b.checkIn,b.checkOut)*u.price,0)),1);

      <div style="background:#111122;border:1px solid #2a2a3d;border-radius:10px;padding:11px 13px"><div style="font-size:10px;color:#64748b;margin-bottom:3px">Total units</div><div style="font-size:20px;font-weight:700;color:#60a5fa">${units.length}</div></div>
      <div style="background:#111122;border:1px solid #2a2a3d;border-radius:10px;padding:11px 13px"><div style="font-size:10px;color:#64748b;margin-bottom:3px">All-time revenue</div><div style="font-size:15px;font-weight:700;color:#22c55e">${fmt(totalRev)}</div></div>
      <div style="background:#111122;border:1px solid #2a2a3d;border-radius:10px;padding:11px 13px"><div style="font-size:10px;color:#64748b;margin-bottom:3px">Data since</div><div style="font-size:12px;font-weight:700;color:#f59e0b">${firstBk?.created?.toDate?.()?.toLocaleDateString()||"—"}</div></div>
      <div style="background:#111122;border:1px solid #2a2a3d;border-radius:10px;padding:11px 13px"><div style="font-size:10px;color:#64748b;margin-bottom:3px">DB status</div><div style="font-size:12px;font-weight:700;color:#22c55e">🟢 Online</div></div>
    </div>
    <button onclick="exportPropCSV()" style="width:100%;padding:13px;background:linear-gradient(135deg,#0d2d1a,#0a2010);border:1.5px solid rgba(34,197,94,.5);border-radius:10px;color:#22c55e;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px">

    <div class="frow">
      <div class="fcol"><label>Month</label><select onchange="setRptMonth(this.value)">${MN.map((mn,i)=>`<option value="${i}" ${i===S.reportMonth?"selected":""}>${mn}</option>`).join("")}</select></div>

    </div>

      <div style="font-size:10px;color:#64748b;margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.04em">Preview: ${MN[S.reportMonth]} ${S.reportYear}</div>

        <div><div style="font-size:10px;color:#64748b">Confirmed</div><div style="font-size:17px;font-weight:700;color:#22c55e">${mb.filter(b=>b.status==="Confirmed").length}</div></div>

    ${units.map(u=>{const c=propClr(u.colorIdx||0);const r=S.bookings.filter(b=>b.unitId===u.id&&b.payment==="Paid").reduce((s,b)=>s+nts(b.checkIn,b.checkOut)*u.price,0);const cnt=S.bookings.filter(b=>b.unitId===u.id).length;

function renderSettings(){

  return`

    </div>
    <div class="frow">
      <div class="fcol"><label>Night surcharge multiplier (e.g. 1.5 = 50% extra)</label><input id="s-night" type="number" step="0.1" value="${p.nightSurcharge}"/></div>
      <div class="fcol"><label>Airport surcharge flat fee (₦)</label><input id="s-airport" type="number" value="${p.airportFee}"/></div>

  </div>`;}

  const s=S.sel;
  const isRide=s.pickup!==undefined;

  // ── DRIVER MODAL ──
  if(isDriver){
    return`<div class="modal-bg" onclick="closeSel()"><div class="modal-box" onclick="event.stopPropagation()">

      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">

                ${DR("Total rides",`<span style="color:#38bdf8;font-weight:500">${s.totalRides||0}</span>`)}
      ${DR("Total earnings",`<span style="color:#22c55e;font-weight:500">${fmt(s.totalEarnings||0)}</span>`)}
      <div style="margin-top:14px"><div style="font-size:12px;color:#64748b;margin-bottom:7px">Update status</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${DRIVER_STATUSES.map(st=>`<button class="btn" style="${(s.status||"Offline")===st?"border-color:#0ea5e9;color:#0ea5e9;font-weight:500":""}" onclick="updateDriverStatus('${s._id}','${st}')">${st}</button>`).join("")}

      </div>
      ${s.phone?`<button class="btn-wa" style="margin-top:12px" onclick="window.open('https://wa.me/${fmtWA(s.phone)}','_blank')">💬 WhatsApp ${esc(s.name.split(" ")[0])}</button>`:""}
    </div></div>`;
  }

  if(isRide){

    const phone=fmtWA(s.phone||"");
    return`<div class="modal-bg" onclick="closeSel()"><div class="modal-box" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:15px;font-weight:600">Ride Details</div>
        <div style="display:flex;gap:7px">${isAdmin()?`<button class="btnd" onclick="setDelId('${s._id}')">Delete</button>`:""}
        <button class="btn" onclick="closeSel()">✕</button></div>
      </div>
      ${DR("Passenger",`<strong>${esc(s.passenger)}</strong>`)}
      ${DR("Phone",esc(s.phone||"—"))}
      ${DR("Pickup",esc(s.pickup||"—"))}
      ${DR("Dropoff",esc(s.dropoff||"—"))}
      ${DR("Date & Time",`${s.date||"—"} ${s.time?fmtT(s.time):""}`)}
      ${DR("Driver",esc(s.driverName||"—"))}
      ${DR("Vehicle",`${esc(s.vehicle||"—")} · <span style="color:#0ea5e9">${esc(s.plate||"—")}</span>`)}
      ${DR("Distance",s.distanceKm?`${s.distanceKm.toFixed(1)} km`:"Not completed yet")}
      ${DR("Fare",`<strong style="color:#22c55e">${fare}</strong>${s.isNight?` <span style="color:#f59e0b;font-size:10px">🌙 night</span>`:""}${s.isAirport?` <span style="color:#38bdf8;font-size:10px">✈️ airport</span>`:""}`)}
      ${DR("Status",rideBadge(s.status))}
      ${DR("Payment",payBadge(s.paymentStatus||"Unpaid"))}
      ${s.notes?DR("Notes",esc(s.notes)):""}

        <button class="btn-grn" style="flex:1;justify-content:center;display:flex;align-items:center;gap:6px;padding:11px" onclick="completeRide('${s._id}')">✅ Complete Ride</button>
        <button class="btn-red" style="padding:11px" onclick="cancelRide('${s._id}')">❌</button>
      </div>`:""}
      ${phone.length>=10?`<button class="btn-wa" style="margin-top:10px" onclick="window.open('https://wa.me/${phone}?text=${encodeURIComponent(`Ride update: ${s.status}. Driver: ${s.driverName||"TBA"}. Plate: ${s.plate||"TBA"}`)}','_blank')">💬 Send WhatsApp Update</button>`:""}
    </div></div>`;
  }

  // ── BOOKING MODAL ──
  const u=getUnit(s.unitId);const c=u?propClr(u.colorIdx||0):PROP_CLRS[0];

  if(S.editMode&&S.editForm){

    return`<div class="modal-bg" onclick="closeSel()"><div class="modal-box" onclick="event.stopPropagation()">

      <label>Notes</label><textarea oninput="updateEF('notes',this.value)">${esc(f.notes||"")}</textarea>

        <button class="btnp" onclick="saveEditBooking()">Save Changes</button>

      </div>
    </div></div>`;

      <div style="display:flex;gap:7px">

    </div>
    ${DR("Guest",`<strong>${esc(s.guest)}</strong>`)}
    ${DR("Email",esc(s.email||"—"))}${DR("Phone",esc(s.phone||"—"))}
    ${DR("Unit",`<span class="badge" style="background:${c.b};color:${c.c};border:1px solid ${c.c}33">${esc(u?.name||"—")}</span>`)}

    ${DR("Check-out",`${s.checkOut}${s.checkOutTime?` <span style="color:#64748b;font-size:11px">at ${fmtT(s.checkOutTime)}</span>`:""}`)}

    ${isMgr()?`
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">
      ${s.phone?`<button class="btn-wa" onclick="window.open('https://wa.me/${fmtWA(s.phone)}?text=${encodeURIComponent(`Hello ${s.guest}! Your booking at ${curProp()?.name||""} is ${s.status}. Check-in: ${s.checkIn}. Total: ₦${total.toLocaleString()}. Thank you!`)}','_blank')">💬 Send WhatsApp</button>`:""}
      ${s.payment!=="Paid"?`<button class="btn-grn" onclick="openPaystack('${s._id}')" style="justify-content:center;display:flex;align-items:center;gap:7px;padding:11px">💳 Collect Payment via Paystack</button>`:`<div style="background:#0d2d1a;border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:11px;text-align:center;font-size:13px;color:#22c55e">✓ Payment fully received</div>`}
    </div>
    <div style="margin-top:14px"><div style="font-size:12px;color:#64748b;margin-bottom:7px">Quick status update</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${BOOK_STATUSES.map(st=>`<button class="btn" style="${s.status===st?"border-color:#7c3aed;color:#9d65f5;font-weight:500":""}" onclick="quickBookStatus('${s._id}','${st}')">${st}</button>`).join("")}
      </div>
    </div>`:""}
  </div></div>`;}

function renderDelConfirm(){
  if(!S.delId)return"";
  const isRide=S.rides.find(r=>r._id===S.delId);
  return`<div class="modal-bg" onclick="clearDel()"><div class="modal-box" style="max-width:330px" onclick="event.stopPropagation()">
    <div style="font-weight:600;margin-bottom:10px;font-size:16px">Delete this ${isRide?"ride":"booking"}?</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:18px">This is permanent and cannot be undone.</div>
    <div style="display:flex;gap:8px">
      <button class="btnp" style="background:#ef4444" onclick="${isRide?`deleteRide('${S.delId}')`:`deleteBooking('${S.delId}')`}">Yes, delete</button>
      <button class="btn" onclick="clearDel()">Cancel</button>
    </div>
  </div></div>`;}

// ════════════════════════════════════════════════════
//  ─── MAIN RENDER ───
// ════════════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");if(!app)return;
  if(S.user===null){app.innerHTML=renderLogin();return;}
  if(!S.user||!S.profile){app.innerHTML=`<div class="splash"><p>Loading ApartBook Pro…</p></div>`;return;}

  const isProp=S.mode==="property";
  const PROP_VIEWS={
    Dashboard:renderPropDashboard, Properties:renderProperties,
    "New Booking":renderNewBooking, Bookings:renderBookings,
    Customers:renderCustomers, Calendar:renderCalendar,
    Reports:renderPropReports, Staff:renderStaff, Audit:renderAudit,
  };
  const TRAN_VIEWS={
    Dashboard:renderTransDashboard, "New Ride":renderNewRide,
    "Live Map":renderLiveMap, Drivers:renderDrivers,
    Rides:renderRides, Reports:renderTransReports,
    Settings:renderSettings, Staff:renderStaff, Audit:renderAudit,
  };
  const views=isProp?PROP_VIEWS:TRAN_VIEWS;
  const content=(views[S.tab]||views.Dashboard)();

  app.innerHTML=`
    ${renderHeader()}
    <div class="main">${content}</div>
    ${S.sel&&!S.delId?renderModal():""}
    ${S.delId?renderDelConfirm():""}
    <a class="wa-float" href="https://wa.me/${SUPPORT_WA}" target="_blank" title="Support">💬</a>`;

  if(S.tab==="Live Map")setTimeout(()=>initMap(),60);
}

// ════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════
auth.onAuthStateChanged(user=>{
  S.user=user||null;
  if(user){
    loadProfile();loadPricing();
    loadProperties();loadDrivers();loadRides();
  }else{
    S.profile=null;S.rides=[];S.drivers=[];S.bookings=[];S.properties=[];
    if(bkUnsub){bkUnsub();bkUnsub=null;}
    if(rideUnsub){rideUnsub();rideUnsub=null;}
    auditUnsub=null;staffUnsub=null;
    document.body.className="";
  }
  render();
});

render();
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>
