<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ApartBook Pro</title>
<meta name="theme-color" content="#8b5cf6"/>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#07070f;color:#e1e7ef;font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;font-size:inherit}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.5)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ffffff14;border-radius:3px}
:root{
  --mc:#8b5cf6;--mb:#12093a;--md:rgba(139,92,246,.35);--mcs:rgba(139,92,246,.12);
  --bg1:#07070f;--bg2:#0c0c1c;--bg3:#111128;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.12);
  --txt:#e1e7ef;--txt2:#94a3b8;--txt3:#475569;
}
body.tm{--mc:#0ea5e9;--mb:#061525;--md:rgba(14,165,233,.35);--mcs:rgba(14,165,233,.1)}

/* ─── HEADER ─── */
.hdr{background:rgba(7,7,15,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;padding:0 12px;height:52px;gap:8px;border-bottom:1px solid var(--bdr)}
.hdr-tabs{display:flex;align-items:center;overflow-x:auto;padding:0 8px;height:40px;gap:1px;scrollbar-width:none}
.hdr-tabs::-webkit-scrollbar{display:none}
.tb{background:none;border:none;border-bottom:2px solid transparent;padding:8px 11px;font-size:11.5px;cursor:pointer;color:var(--txt3);white-space:nowrap;flex-shrink:0;height:100%;font-family:inherit;letter-spacing:.02em;transition:color .15s}
.tb:hover{color:var(--txt2)}
.tb.active{border-bottom-color:var(--mc);color:var(--mc);font-weight:600}
.mt{display:flex;background:rgba(255,255,255,.06);border:1px solid var(--bdr2);border-radius:9px;overflow:hidden;flex-shrink:0}
.mb{padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--txt3);font-family:inherit;transition:.15s}
.mb.ap{background:rgba(139,92,246,.2);color:#c4b5fd}
.mb.at{background:rgba(14,165,233,.18);color:#7dd3fc}

/* ─── LAYOUT ─── */
.main{padding:16px 14px;max-width:990px;margin:0 auto}
.pg{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-.02em}

/* ─── CARDS ─── */
.card{background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.015));border:1px solid var(--bdr);border-radius:14px;padding:18px 20px;margin-bottom:14px;transition:border-color .2s}
.card:hover{border-color:var(--bdr2)}
.ct{font-size:10px;font-weight:700;margin-bottom:13px;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em}

/* ─── STATS ─── */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px}
.stat{background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid var(--bdr);border-radius:13px;padding:13px 15px;transition:transform .2s,border-color .2s}
.stat:hover{transform:translateY(-1px);border-color:var(--bdr2)}
.sl{font-size:10px;color:var(--txt3);margin-bottom:4px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.sv{font-size:22px;font-weight:700;font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em}
.wide{grid-column:1/-1}
@media(min-width:500px){.stats{grid-template-columns:repeat(3,1fr)}}

/* ─── FORMS ─── */
label{font-size:12px;color:var(--txt3);display:block;margin-bottom:5px;font-weight:500;letter-spacing:.025em}
input,select,textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bdr2);border-radius:9px;color:var(--txt);padding:9px 13px;font-size:13px;margin-bottom:11px;outline:none;transition:border-color .15s,background .15s}
input:focus,select:focus,textarea:focus{border-color:var(--mc);background:rgba(255,255,255,.08)}
textarea{resize:vertical;min-height:62px}
.fr{display:flex;gap:10px;flex-wrap:wrap}
.fc{flex:1;min-width:140px}

/* ─── BUTTONS ─── */
.btn{background:rgba(255,255,255,.05);border:1px solid var(--bdr2);border-radius:9px;padding:8px 15px;cursor:pointer;font-size:12px;color:var(--txt);font-family:inherit;transition:background .15s,border-color .15s}
.btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18)}
.btnp{background:linear-gradient(135deg,var(--mc),color-mix(in srgb,var(--mc) 80%,#000));border:none;border-radius:9px;padding:10px 22px;cursor:pointer;font-size:13px;color:#fff;font-weight:600;font-family:inherit;box-shadow:0 4px 20px var(--md);transition:transform .15s,box-shadow .15s}
.btnp:hover{transform:translateY(-1px);box-shadow:0 6px 28px var(--md)}
.btnp:active{transform:translateY(0)}
.btnd{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.35);border-radius:9px;padding:8px 15px;cursor:pointer;font-size:12px;color:#ef4444;font-family:inherit;transition:background .15s}
.btnd:hover{background:rgba(239,68,68,.14)}
.bg{background:rgba(34,197,94,.1);border:1.5px solid rgba(34,197,94,.4);border-radius:9px;padding:9px 16px;cursor:pointer;font-size:12px;color:#22c55e;font-weight:600;font-family:inherit;transition:background .15s}
.bg:hover{background:rgba(34,197,94,.18)}
.br{background:rgba(239,68,68,.09);border:1.5px solid rgba(239,68,68,.4);border-radius:9px;padding:9px 16px;cursor:pointer;font-size:12px;color:#ef4444;font-weight:600;font-family:inherit;transition:background .15s}
.br:hover{background:rgba(239,68,68,.16)}
.bw{background:rgba(37,211,102,.07);border:1.5px solid rgba(37,211,102,.3);border-radius:9px;padding:10px 16px;cursor:pointer;font-size:13px;color:#25d366;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-bottom:9px;font-family:inherit;transition:background .15s}
.bw:hover{background:rgba(37,211,102,.13)}

/* ─── TABLES ─── */
.tw{overflow-x:auto;border:1px solid var(--bdr);border-radius:13px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:10px 13px;border-bottom:1px solid var(--bdr);color:var(--txt3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;background:rgba(255,255,255,.02)}
td{padding:11px 13px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border:none}
tbody tr:hover td{background:rgba(255,255,255,.03);cursor:pointer}
#live-map{height:320px;border-radius:11px;border:1px solid var(--bdr);z-index:1}

/* ─── MODAL ─── */
.mb2{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:300;padding:14px}
.mbox{background:#0d0d1c;border:1px solid var(--bdr2);border-radius:16px;padding:24px;max-width:490px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 28px 80px rgba(0,0,0,.7)}
.dr{display:flex;border-bottom:1px solid var(--bdr);padding:9px 0;font-size:13px}
.dl{color:var(--txt3);width:120px;flex-shrink:0;font-size:12px}

/* ─── MISC ─── */
.em{color:var(--txt3);font-size:13px;padding:22px;text-align:center}
.er{font-size:12px;color:#ef4444;margin-bottom:9px;min-height:17px}
.ok{font-size:12px;color:#22c55e;margin-bottom:9px;min-height:17px}
.ib{background:rgba(255,255,255,.04);border:1px solid var(--bdr2);border-radius:9px;padding:11px 15px;margin-bottom:13px;font-size:13px}
.sr{display:flex;gap:8px;margin-bottom:13px;flex-wrap:wrap}
.sr input,.sr select{flex:1;min-width:140px;margin-bottom:0}
.bb{height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:5px}
.bf{height:100%;border-radius:4px}
.li{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.li:last-child{border:none}
.pu{animation:pu-a 1.5s infinite}
@keyframes pu-a{0%,100%{opacity:1}50%{opacity:.3}}
.tk-w{overflow:hidden;border-radius:6px;padding:5px 9px;height:26px;display:flex;align-items:center}
@keyframes tk{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk{animation:tk 14s linear infinite;white-space:nowrap;display:inline-block}
.tk:hover{animation-play-state:paused}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-family:'Bricolage Grotesque',sans-serif}
.bdg{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;display:inline-block;white-space:nowrap}

/* ─── LOGIN ─── */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg1);overflow:hidden;position:relative}
.lg{position:fixed;top:-15%;left:50%;transform:translateX(-50%);width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.06) 0%,transparent 65%);pointer-events:none}
.lg2{position:fixed;bottom:-30%;right:-10%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,.04) 0%,transparent 70%);pointer-events:none}
.lc{background:linear-gradient(145deg,rgba(255,255,255,.055),rgba(255,255,255,.02));border:1px solid var(--bdr2);border-radius:20px;padding:32px 28px;box-shadow:0 32px 80px rgba(0,0,0,.5);width:100%;max-width:420px}
.pw{position:relative;margin-bottom:7px}
.pw input{margin-bottom:0;padding-right:48px}
.pwt{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:0;font-family:inherit}
.bl{width:100%;padding:13px;font-size:14px;font-weight:700;border:none;border-radius:11px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;cursor:pointer;margin-top:18px;box-shadow:0 6px 28px rgba(139,92,246,.45);font-family:'Bricolage Grotesque',sans-serif;letter-spacing:.01em;transition:transform .15s,box-shadow .15s}
.bl:hover{transform:translateY(-1px);box-shadow:0 8px 36px rgba(139,92,246,.55)}
.bl:active{transform:translateY(0)}
.blc{width:100%;padding:13px;font-size:14px;font-weight:700;border:none;border-radius:11px;background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;cursor:pointer;margin-top:10px;box-shadow:0 6px 28px rgba(14,165,233,.35);font-family:'Bricolage Grotesque',sans-serif;letter-spacing:.01em;transition:transform .15s,box-shadow .15s}
.blc:hover{transform:translateY(-1px);box-shadow:0 8px 36px rgba(14,165,233,.45)}
.sp{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;background:var(--bg1)}
.sp p{color:var(--txt3);font-size:14px}

/* Login tabs */
.ltab-wrap{display:flex;background:rgba(255,255,255,.06);border-radius:10px;padding:4px;margin-bottom:24px;gap:3px}
.ltab{flex:1;padding:9px;border:none;background:none;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--txt3);font-family:inherit;transition:.2s}
.ltab.act{background:rgba(255,255,255,.12);color:var(--txt)}

/* Subtabs (sign in / sign up) */
.subtab-wrap{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--bdr)}
.subtab{flex:1;padding:9px 0;border:none;background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--txt3);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s}
.subtab.act{color:var(--mc);border-bottom-color:var(--mc);font-weight:700}

/* ─── FAB ─── */
.waf{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:24px;z-index:200;box-shadow:0 6px 24px rgba(37,211,102,.55);text-decoration:none;transition:transform .2s}
.waf:hover{transform:scale(1.06)}

/* ─── DROPDOWN ─── */
.dd{position:absolute;top:100%;left:0;right:0;background:#0d0d1c;border:1px solid var(--bdr2);border-top:none;border-radius:0 0 10px 10px;z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 10px 32px rgba(0,0,0,.7);display:none}
.ddi{padding:11px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--bdr);color:var(--txt)}
.ddi:hover{background:rgba(255,255,255,.07)}
.ddi:last-child{border:none}

/* ─── CUSTOMER PORTAL ─── */
.cust-hero{background:linear-gradient(135deg,rgba(139,92,246,.14),rgba(6,182,212,.07));border:1px solid rgba(139,92,246,.22);border-radius:16px;padding:28px 22px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden}
.cust-hero::before{content:'';position:absolute;top:-40%;right:-10%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.12),transparent);pointer-events:none}
.unit-browse-card{background:linear-gradient(145deg,rgba(255,255,255,.05),rgba(255,255,255,.015));border:2px solid var(--bdr);border-radius:14px;padding:18px;cursor:pointer;transition:border-color .2s,transform .18s,box-shadow .18s;margin-bottom:10px}
.unit-browse-card:hover{border-color:var(--mc);transform:translateY(-2px);box-shadow:0 8px 32px var(--mcs)}
.unit-browse-card.sel{border-color:var(--mc);background:rgba(139,92,246,.08)}
.track-card{background:linear-gradient(135deg,rgba(14,165,233,.1),rgba(34,197,94,.05));border:2px solid rgba(14,165,233,.3);border-radius:14px;padding:20px}
.step-badge{background:var(--mc);color:#fff;width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'Bricolage Grotesque',sans-serif}

/* ─── ANIMATIONS ─── */
/* fadeUp removed — was causing blink on every render */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="app"><div class="sp"><p>Starting ApartBook Pro…</p></div></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
// ── FIREBASE CONFIG ──
firebase.initializeApp({
  apiKey:            "AIzaSyBX05w4u5H5l5ZBJlsai-Y2VarTL8R_l_U",
  authDomain:        "apartbook-pro-demo-e532a.firebaseapp.com",
  projectId:         "apartbook-pro-demo-e532a",
  storageBucket:     "apartbook-pro-demo-e532a.firebasestorage.app",
  messagingSenderId: "228723518944",
  appId:             "1:228723518944:web:aa28ff90ae8437b4628f85",
  databaseURL:       "https://apartbook-pro-demo-e532a-default-rtdb.europe-west1.firebasedatabase.app"
});

const PAYSTACK_KEY = "REPLACE_WITH_YOUR_PAYSTACK_KEY";
const SUPPORT_WA = "2348000000000";
const auth=firebase.auth();
const db=firebase.firestore();
const rtdb=firebase.database();
const TS=firebase.firestore.FieldValue.serverTimestamp;

// ── CONSTANTS ──
const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
const BS={Confirmed:{bg:"#0d2d1a",c:"#22c55e"},Pending:{bg:"#2d1f0d",c:"#f59e0b"},Cancelled:{bg:"#2d0d0d",c:"#ef4444"},"Checked-out":{bg:"#1a1040",c:"#a78bfa"}};
const RS={Pending:{bg:"#2d1f0d",c:"#f59e0b"},Active:{bg:"#0d2d1a",c:"#22c55e"},Completed:{bg:"#0d1f36",c:"#38bdf8"},Cancelled:{bg:"#2d0d0d",c:"#ef4444"}};
const DS={Online:{bg:"#0d2d1a",c:"#22c55e"},Offline:{bg:"#1a1a1a",c:"#64748b"},"On Ride":{bg:"#0d1f36",c:"#38bdf8"}};
// FIX: Role colors for staff badges
const RCL={admin:{bg:"#0d2d1a",c:"#22c55e"},manager:{bg:"#2d1a05",c:"#f59e0b"},driver:{bg:"#062730",c:"#0ea5e9"},staff:{bg:"#1a1040",c:"#a78bfa"}};
const BSTAT=["Confirmed","Pending","Cancelled","Checked-out"];
const RSTAT=["Pending","Active","Completed","Cancelled"];
const DSTAT=["Online","Offline","On Ride"];
const ROLES=["admin","manager","staff","driver"];
const PC=[{c:"#7c3aed",b:"#1a1040"},{c:"#2563eb",b:"#0d1f4a"},{c:"#16a34a",b:"#0a2818"},{c:"#dc2626",b:"#2d0a0a"},{c:"#d97706",b:"#2d1a05"},{c:"#0891b2",b:"#062730"},{c:"#c026d3",b:"#2a0a2e"},{c:"#65a30d",b:"#1a2405"},{c:"#ea580c",b:"#2d1005"},{c:"#0d9488",b:"#062420"}];
const DU=[{id:"A1",name:"Garden Suite",floor:"Ground",beds:1,price:45000,colorIdx:0},{id:"A2",name:"City View Flat",floor:"1st",beds:2,price:65000,colorIdx:1},{id:"A3",name:"Executive Studio",floor:"2nd",beds:1,price:55000,colorIdx:2},{id:"A4",name:"Family Apartment",floor:"2nd",beds:3,price:85000,colorIdx:3},{id:"A5",name:"Deluxe Loft",floor:"3rd",beds:2,price:75000,colorIdx:4},{id:"A6",name:"Penthouse",floor:"Top",beds:4,price:150000,colorIdx:5}];
const DP={baseFare:500,perKm:120,perMinWaiting:25,minFare:800,nightSurcharge:1.5,airportFee:500,bookingFee:100};

// ── HELPERS ──
const fmt=n=>"₦"+Number(n).toLocaleString();
const nts=(a,b)=>Math.max(0,(new Date(b)-new Date(a))/86400000);
const ini=n=>(n||"?").split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();
const tod=()=>new Date().toISOString().split("T")[0];
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const wa=p=>{const d=String(p||"").replace(/\D/g,"");return d.startsWith("0")?"234"+d.slice(1):d.startsWith("234")?d:d;};
const ftm=t=>{if(!t)return"—";const[h,m]=t.split(":");const hh=Number(h);return(hh%12||12)+":"+m+" "+(hh<12?"AM":"PM");};
const nowt=()=>new Date().toTimeString().slice(0,5);
const pc=i=>PC[i%PC.length]||PC[0];
const isNt=()=>{const h=new Date().getHours();return h>=22||h<5;};
function calcFare(km,wait,p,night,airport){
  let f=p.baseFare+(km*p.perKm)+(wait*p.perMinWaiting)+p.bookingFee;
  if(airport)f+=p.airportFee;if(night)f*=p.nightSurcharge;
  return Math.max(f,p.minFare);
}
function distKm(la1,lo1,la2,lo2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

let gpsW=null;
function startGPS(rideId){
  if(!navigator.geolocation){toast("GPS not available on this device.","warn");return;}
  S.isTracking=true;S.trackRide=rideId;
  gpsW=navigator.geolocation.watchPosition(
    async pos=>{
      try{await rtdb.ref("drivers_live/"+S.user.uid).set({lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,rideId,timestamp:Date.now(),name:S.profile?.name||S.user.email});}catch(_){}
      render();
    },

    {enableHighAccuracy:true,maximumAge:3000,timeout:10000}
  );
}
function stopGPS(){
  if(gpsW!=null){navigator.geolocation.clearWatch(gpsW);gpsW=null;}
  if(S.user)rtdb.ref("drivers_live/"+S.user.uid).remove().catch(()=>{});
  S.isTracking=false;S.trackRide=null;
}

let leafM=null,mMarkers={},rtdbLsn=null;
function destroyMap(){
  if(rtdbLsn){rtdb.ref("drivers_live").off("value",rtdbLsn);rtdbLsn=null;}
  Object.values(mMarkers).forEach(m=>{try{if(leafM)leafM.removeLayer(m);}catch(_){}});
  mMarkers={};
  if(leafM){try{leafM.remove();}catch(_){}leafM=null;}
}
function initMap(){
  const el=document.getElementById("live-map");if(!el)return;
  destroyMap();
  leafM=L.map("live-map",{zoomControl:true}).setView([6.5244,3.3792],12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(leafM);
  setTimeout(()=>{if(leafM)leafM.invalidateSize();},200);
  rtdbLsn=rtdb.ref("drivers_live").on("value",snap=>{
    Object.values(mMarkers).forEach(m=>{try{if(leafM)leafM.removeLayer(m);}catch(_){}});
    mMarkers={};
    Object.entries(snap.val()||{}).forEach(([uid,loc])=>{
      if(!loc.lat||!loc.lng||!leafM)return;
      const icon=L.divIcon({html:'<div style="background:#0ea5e9;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(14,165,233,.8)"></div>',iconSize:[14,14],className:""});
      mMarkers[uid]=L.marker([loc.lat,loc.lng],{icon}).bindPopup("🚗 "+(loc.name||"Driver")).addTo(leafM);
    });
  });
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{if(leafM)leafM.setView([p.coords.latitude,p.coords.longitude],13);},()=>{});
}

// ── LOCATION AUTOCOMPLETE ──
const lcT={};
window.locSearch=async function(inId,ddId){
  const inp=document.getElementById(inId);const dd=document.getElementById(ddId);
  if(!inp||!dd)return;
  const q=inp.value.trim();
  if(q.length<3){dd.innerHTML="";dd.style.display="none";return;}
  clearTimeout(lcT[inId]);
  lcT[inId]=setTimeout(async()=>{
    try{
      const url="https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(q)+"&format=json&limit=6&countrycodes=ng&addressdetails=1";
      const res=await fetch(url,{headers:{"Accept-Language":"en"}});
      const data=await res.json();
      if(!data.length){dd.innerHTML='<div class="ddi" style="color:#64748b">No locations found</div>';dd.style.display="block";return;}
      dd.innerHTML=data.map(r=>{
        const pts=[r.address?.road||r.address?.pedestrian,r.address?.suburb||r.address?.neighbourhood,r.address?.city||r.address?.town||r.address?.state_district,r.address?.state].filter(Boolean);
        const lbl=pts.length?pts.join(", "):r.display_name.split(",").slice(0,3).join(",");
        const city=[r.address?.city||r.address?.town,r.address?.state].filter(Boolean).join(", ");
        return '<div class="ddi" onclick="selLoc(\''+inId+'\',\''+ddId+'\',this.dataset.lbl)" data-lbl="'+lbl.replace(/"/g,"&quot;")+'"><div>📍 '+esc(lbl)+'</div>'+(city?'<div style="font-size:10px;color:#64748b;margin-top:2px">'+esc(city)+'</div>':'')+'</div>';
      }).join("");
      dd.style.display="block";
    }catch(_){dd.innerHTML="";dd.style.display="none";}
  },500);
};
window.selLoc=function(inId,ddId,lbl){
  const inp=document.getElementById(inId);if(inp)inp.value=lbl;

    const ok=document.getElementById("b-ok");if(ok){ok.textContent="✅ Saved!";setTimeout(()=>{if(ok)ok.textContent="";},3000);}
    const ph=wa(f.phone||"");

window.addRide=async function(){
  const er=document.getElementById("r-er");
  const f={
    passenger:document.getElementById("r-ps")?.value?.trim(),
    phone:document.getElementById("r-ph")?.value?.trim(),
    pickup:document.getElementById("r-pu")?.value?.trim(),
    dropoff:document.getElementById("r-do")?.value?.trim(),
    driverId:document.getElementById("r-dr")?.value,
    isAirport:document.getElementById("r-air")?.checked||false,
    notes:document.getElementById("r-no")?.value?.trim(),
    date:document.getElementById("r-dt")?.value||tod(),
    time:document.getElementById("r-tm")?.value||nowt(),
  };
  const se=m=>{if(er)er.textContent=m;};
  if(!f.passenger){se("Passenger name required.");return;}
  if(!f.pickup){se("Pickup required.");return;}
  if(!f.dropoff){se("Dropoff required.");return;}
  if(!f.driverId){se("Please assign a driver.");return;}
  const drv=S.drivers.find(d=>d._id===f.driverId);
  const ef=Math.round(calcFare(5,0,S.pricing,isNt(),f.isAirport));
  try{
    const ref=await db.collection("rides").add({...f,status:"Pending",fare:0,estimatedFare:ef,distanceKm:0,durationMins:0,driverName:drv?.name||"",driverPhone:drv?.phone||"",vehicle:drv?.vehicle||"",plate:drv?.plate||"",createdBy:S.user.email,created:TS(),paymentStatus:"Unpaid"});
    if(f.driverId)db.collection("drivers").doc(f.driverId).update({status:"On Ride",currentRideId:ref.id,uid:f.driverId}).catch(()=>{});
    const msg=encodeURIComponent("Hello "+f.passenger+"! 🚗\n\nYour ride is confirmed.\n\n📍 Pickup: "+f.pickup+"\n📍 Dropoff: "+f.dropoff+"\n🚙 Driver: "+(drv?.name||"TBA")+" · "+(drv?.plate||"TBA")+"\n📞 "+(drv?.phone||"TBA")+"\n⏰ "+f.time+"\n\nThank you! 🙏");
    ["r-ps","r-ph","r-pu","r-do","r-no"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    const de=document.getElementById("r-dr");if(de)de.selectedIndex=0;
    if(er)er.textContent="";
    const ok=document.getElementById("r-ok");if(ok){ok.textContent="✅ Ride booked!";setTimeout(()=>{if(ok)ok.textContent="";},3000);}
    const ph=wa(f.phone||"");

  }catch(e){se("Error: "+e.message);}
};

window.completeRide=async function(id){
  const ride=S.rides.find(r=>r._id===id);if(!ride)return;
  const ks=prompt("Distance in km:");if(!ks)return;
  const km=parseFloat(ks)||0;const wt=parseFloat(prompt("Waiting time in minutes:")||"0")||0;
  const night=isNt();const fare=Math.round(calcFare(km,wt,S.pricing,night,ride.isAirport));
  if(!confirm("Fare: "+fmt(fare)+"\n"+km+"km · "+wt+"min"+( night?" · 🌙 night":"")+(ride.isAirport?" · ✈️ airport":"")+"\n\nConfirm?"))return;
  try{
    await db.collection("rides").doc(id).update({status:"Completed",fare,distanceKm:km,durationMins:wt,completedAt:TS(),endTime:nowt(),endDate:tod(),isNight:night,paymentStatus:"Paid"});
    if(ride.driverId)db.collection("drivers").doc(ride.driverId).update({status:"Online",currentRideId:null,totalRides:firebase.firestore.FieldValue.increment(1),totalEarnings:firebase.firestore.FieldValue.increment(fare)}).catch(()=>{});

function dlCSV(rows,fn){
  const csv=rows.map(r=>r.map(c=>{const s=String(c==null?"":c).replace(/"/g,'""');return s.includes(",")||s.includes("\n")||s.includes('"')?'"'+s+'"':s;}).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

window.setDrvOnline=async function(status){
  const myDriver=S.drivers.find(d=>d.uid===S.user.uid||d.phone===S.profile?.phone||d.name===S.profile?.name);
  if(!myDriver){toast("Your driver profile is not set up. Ask admin to add you as a driver first.","warn");return;}
  // Also store status in user profile (always works)
  await db.collection("users").doc(S.user.uid).update({driverStatus:status==="online"?"Online":"Offline"}).catch(()=>{});
  try{
    await db.collection("drivers").doc(myDriver._id).update({status:status==="online"?"Online":"Offline",uid:S.user.uid});
    if(status==="online"&&!S.isTracking)startGPS("online-"+Date.now());
    if(status==="offline")stopGPS();
    render();
  }catch(e){toast("Error: "+e.message);}
};

window.drvStartRide=async function(id){
  try{
    await db.collection("rides").doc(id).update({status:"Active",startedAt:TS(),startTime:nowt(),startDate:tod()});
    if(S.sel?._id===id)S.sel={...S.sel,status:"Active"};
    if(!S.isTracking)startGPS(id);
    render();
  }catch(e){toast("Error: "+e.message);}
};

window.custBookUnit=async function(uid){
  const er=document.getElementById("cb-er");
  const guest=document.getElementById("cb-guest")?.value?.trim();
  const email=document.getElementById("cb-email")?.value?.trim();
  const phone=document.getElementById("cb-phone")?.value?.trim();
  const cin=document.getElementById("cb-cin")?.value;
  const cout=document.getElementById("cb-cout")?.value;
  const cit=document.getElementById("cb-cit")?.value||"14:00";
  const cot=document.getElementById("cb-cot")?.value||"11:00";
  const notes=document.getElementById("cb-notes")?.value?.trim();
  if(!guest){if(er)er.textContent="Your name is required.";return;}
  if(!cin||!cout){if(er)er.textContent="Please select check-in and check-out dates.";return;}
  if(cout<=cin){if(er)er.textContent="Check-out must be after check-in.";return;}
  const u=S.custSelUnit;
  if(!u||!S.selProp){if(er)er.textContent="Unit error. Please go back and try again.";return;}
  try{
    await db.collection("bookings").add({guest,email:email||S.user.email,phone:phone||"",unitId:uid,propertyId:S.selProp,checkIn:cin,checkOut:cout,checkInTime:cit,checkOutTime:cot,status:"Pending",payment:"Unpaid",notes:notes||"",created:TS(),createdBy:S.user.email,bookedOnline:true});
    const tot=nts(cin,cout)*(u.price||0);
    const ok=document.getElementById("cb-ok");
    if(ok){ok.textContent="✅ Booking submitted! We'll confirm shortly.";setTimeout(()=>{S.custSelUnit=null;S.custTab="My Bookings";render();},2500);}
    const ph=wa(phone||"");
    if(ph.length>=10){
      const msg=encodeURIComponent("Hello "+guest+"! 🏠\n\nYour booking request has been received.\n\n📍 Unit: "+u.name+"\n📅 Check-in: "+cin+"\n📅 Check-out: "+cout+"\n🌙 Nights: "+nts(cin,cout)+"\n💰 Est. Total: "+fmt(tot)+"\n\nStatus: Pending confirmation\nWe'll get back to you shortly! 🙏");
      window.open("https://wa.me/"+ph+"?text="+msg,"_blank");
    }
  }catch(e){if(er)er.textContent="Error: "+e.message;}
};


window.custPayAndBook=async function(uid){
  const er=document.getElementById("cb-er");
  const guest=document.getElementById("cb-guest")?.value?.trim();
  const email=document.getElementById("cb-email")?.value?.trim()||S.user.email;
  const cin=document.getElementById("cb-cin")?.value;
  const cout=document.getElementById("cb-cout")?.value;
  const cit=document.getElementById("cb-cit")?.value||"14:00";
  const cot=document.getElementById("cb-cot")?.value||"11:00";
  if(!guest){if(er)er.textContent="Your name is required.";return;}
  if(!cin||!cout){if(er)er.textContent="Please select check-in and check-out dates.";return;}
  if(cout<=cin){if(er)er.textContent="Check-out must be after check-in.";return;}
  const u=S.custSelUnit;if(!u){if(er)er.textContent="Unit error.";return;}
  const tot=nts(cin,cout)*(u.price||0);
  if(!window.PaystackPop){if(er)er.textContent="Payment not available. Use 'Reserve Now, Pay Later'.";return;}
  if(PAYSTACK_KEY.includes("REPLACE")){
    // Demo mode — proceed without real payment, pass all captured values
    const prefill={guest,email,phone:document.getElementById("cb-phone")?.value?.trim()||"",
      cin,cout,cit,cot,notes:document.getElementById("cb-notes")?.value?.trim()||""};
    if(er)er.textContent="";
    toast("Paystack not configured — reserving without payment.","warn");
    custBookUnit(uid, prefill);
    return;
  }
  window.PaystackPop.setup({
    key:PAYSTACK_KEY,
    email,
    amount:tot*100,
    currency:"NGN",
    ref:"APT-"+Date.now(),
    metadata:{guest,unit:u.name,checkIn:cin,checkOut:cout},
    callback:async function(r){
      try{
        const phone=document.getElementById("cb-phone")?.value?.trim()||"";
        const notes=document.getElementById("cb-notes")?.value?.trim()||"";
        await db.collection("bookings").add({
          guest,email,phone,unitId:uid,propertyId:S.selProp,
          checkIn:cin,checkOut:cout,checkInTime:cit,checkOutTime:cot,
          status:"Confirmed",payment:"Paid",
          paystackRef:r.reference,notes,
          created:TS(),createdBy:S.user.email,bookedOnline:true
        });
        const ok=document.getElementById("cb-ok");
        if(ok){ok.textContent="✅ Payment successful! Booking confirmed.";
          setTimeout(()=>{S.custSelUnit=null;S.custTab="My Bookings";render();},2000);}
      }catch(e){if(er)er.textContent="Booking error: "+e.message;}
    },
    onClose:function(){if(er)er.textContent="Payment cancelled. Use 'Reserve Now, Pay Later' to book without payment.";}
  }).openIframe();
};

window.custBookRide=async function(){
  const er=document.getElementById("cr-er");
  const se=m=>{if(er)er.textContent=m;};
  const f={
    passenger:document.getElementById("cr-name")?.value?.trim(),
    phone:document.getElementById("cr-phone")?.value?.trim(),
    pickup:document.getElementById("cr-pu")?.value?.trim(),
    dropoff:document.getElementById("cr-do")?.value?.trim(),
    date:document.getElementById("cr-dt")?.value||tod(),
    time:document.getElementById("cr-tm")?.value||nowt(),
    isAirport:document.getElementById("cr-air")?.checked||false,
    notes:document.getElementById("cr-notes")?.value?.trim(),
  };
  if(!f.passenger){se("Your name is required.");return;}
  if(!f.phone){se("WhatsApp number required for ride updates.");return;}
  if(!f.pickup){se("Pickup location required.");return;}
  if(!f.dropoff){se("Dropoff location required.");return;}
  const ef=Math.round(calcFare(5,0,S.pricing,isNt(),f.isAirport));
  try{
    const avDrvs=S.drivers.filter(d=>d.status!=="On Ride");
    const drv=avDrvs[0]||null;
    await db.collection("rides").add({...f,status:"Pending",fare:0,estimatedFare:ef,distanceKm:0,durationMins:0,driverId:drv?._id||"",driverName:drv?.name||"",driverPhone:drv?.phone||"",vehicle:drv?.vehicle||"",plate:drv?.plate||"",createdBy:S.user.email,bookedOnline:true,created:TS(),paymentStatus:"Unpaid"});
    const ok=document.getElementById("cr-ok");if(ok){ok.textContent="✅ Ride requested! You'll receive a WhatsApp update when a driver is assigned.";setTimeout(()=>{S.custTab="Track Driver";render();},2800);}
    const ph=wa(f.phone||"");
    if(ph.length>=10){
      const msg=encodeURIComponent("Hello "+f.passenger+"! 🚗\n\nYour ride request has been received.\n\n📍 Pickup: "+f.pickup+"\n📍 Dropoff: "+f.dropoff+"\n⏰ "+f.time+"\n💰 Est. Fare: "+fmt(ef)+"\n\nWe'll assign a driver shortly. Thank you! 🙏");
      window.open("https://wa.me/"+ph+"?text="+msg,"_blank");
    }
  }catch(e){se("Error: "+e.message);}
};

// ── TRACK DRIVER ──
let custMap=null,custDrvMarker=null,custPickupMk=null,custDropMk=null,custRtdbLsn=null,custRouteLine=null;

function gcIcon(emoji,color,size,pulse){
  return L.divIcon({
    html:'<div style="background:'+color+';border-radius:50%;width:'+size+'px;height:'+size+'px;display:flex;align-items:center;justify-content:center;font-size:'+(size*.55)+'px;border:3px solid #fff;box-shadow:0 3px 14px rgba(0,0,0,.45)">'+emoji+'</div>',
    iconSize:[size,size],iconAnchor:[size/2,size/2],popupAnchor:[0,-size/2]
  });
}

async function drawRoute(map,fromLatLng,toLatLng){
  if(custRouteLine){map.removeLayer(custRouteLine);custRouteLine=null;}
  try{
    const url='https://router.project-osrm.org/route/v1/driving/'+fromLatLng[1]+','+fromLatLng[0]+';'+toLatLng[1]+','+toLatLng[0]+'?overview=full&geometries=geojson';
    const res=await fetch(url);const data=await res.json();
    if(data.routes?.[0]){
      const coords=data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
      custRouteLine=L.polyline(coords,{color:'#8b5cf6',weight:5,opacity:.85,lineCap:'round'}).addTo(map);
      const dur=Math.round(data.routes[0].duration/60);
      const dist=(data.routes[0].distance/1000).toFixed(1);
      return{eta:dur,dist};
    }
  }catch(e){}
  return null;
}

async function geocode(q){
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=1&countrycodes=ng');
    const d=await r.json();if(d[0])return[parseFloat(d[0].lat),parseFloat(d[0].lon)];
  }catch(e){}
  return null;
}

async function initCustMap(cur){
  const el=document.getElementById('cust-live-map');
  if(!el){setTimeout(()=>initCustMap(cur),300);return;}
  if(!custMap){
    custMap=L.map('cust-live-map',{zoomControl:false,attributionControl:false}).setView([6.5244,3.3792],13);
    // Try dark tiles, fall back to standard OSM if blocked
    const darkTile=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19});
    const osmTile=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19});
    darkTile.addTo(custMap);
    darkTile.on('tileerror',()=>{custMap.removeLayer(darkTile);osmTile.addTo(custMap);});
    L.control.zoom({position:'topright'}).addTo(custMap);
  }
  // Multiple invalidateSize calls to handle async DOM rendering
  [100,250,500].forEach(d=>setTimeout(()=>{if(custMap)custMap.invalidateSize();},d));

  const bounds=[];

  // Geocode and place pickup marker
  if(cur?.pickup&&!custPickupMk){
    const pos=await geocode(cur.pickup);
    if(pos){
      custPickupMk=L.marker(pos,{icon:gcIcon('🟢','#22c55e',30)}).addTo(custMap).bindPopup('<b>Pickup</b><br>'+esc(cur.pickup));
      bounds.push(pos);
    }
  }else if(custPickupMk)bounds.push(custPickupMk.getLatLng());

  // Geocode and place dropoff marker
  if(cur?.dropoff&&!custDropMk){
    const pos=await geocode(cur.dropoff);
    if(pos){
      custDropMk=L.marker(pos,{icon:gcIcon('🔴','#ef4444',30)}).addTo(custMap).bindPopup('<b>Dropoff</b><br>'+esc(cur.dropoff));
      bounds.push(pos);
    }
  }else if(custDropMk)bounds.push(custDropMk.getLatLng());

  // Draw route between pickup and dropoff
  if(custPickupMk&&custDropMk&&!custRouteLine){
    const pu=custPickupMk.getLatLng(),dr=custDropMk.getLatLng();
    const info=await drawRoute(custMap,[pu.lat,pu.lng],[dr.lat,dr.lng]);
    if(info){
      const etaEl=document.getElementById('cust-eta');
      if(etaEl)etaEl.innerHTML='⏱ <strong>ETA: ~'+info.eta+' min</strong> &nbsp;·&nbsp; '+info.dist+' km';
    }
  }

  // Fit map to markers
  if(bounds.length>1)custMap.fitBounds(bounds,{padding:[30,30]});
  else if(bounds.length===1)custMap.setView(bounds[0],14);

  // Real-time driver position from Firebase RTDB
  const drvId=cur?.driverId;
  if(drvId&&custRtdbLsn!==drvId){
    if(custRtdbLsn){rtdb.ref('drivers_live/'+custRtdbLsn).off();custRtdbLsn=null;}
    custRtdbLsn=drvId;
    rtdb.ref('drivers_live/'+drvId).on('value',snap=>{
      const d=snap.val();if(!d||!d.lat)return;
      const pos=[d.lat,d.lng];
      if(!custDrvMarker){
        custDrvMarker=L.marker(pos,{icon:gcIcon('🚗','#8b5cf6',44,true),zIndexOffset:1000}).addTo(custMap).bindPopup((d.name||'Driver')+' — Live');
      }else{custDrvMarker.setLatLng(pos);}
      custMap.panTo(pos,{animate:true,duration:0.8});
      // Update ETA from driver position
      const drEl=document.getElementById('cust-eta');
      if(drEl&&custDropMk){
        const dl=custDropMk.getLatLng();
        const distKm=custMap.distance(pos,[dl.lat,dl.lng])/1000;
        const etaMin=Math.ceil(distKm/0.5);
        drEl.innerHTML='⏱ <strong>ETA: ~'+etaMin+' min</strong>&nbsp;·&nbsp;'+distKm.toFixed(1)+' km away';
      }
    });
  }
}

function cleanCustMap(){
  if(custRtdbLsn){rtdb.ref('drivers_live/'+custRtdbLsn).off();custRtdbLsn=null;}
  if(custRouteLine&&custMap){custMap.removeLayer(custRouteLine);custRouteLine=null;}
  if(custMap){custMap.remove();custMap=null;}
  custDrvMarker=null;custPickupMk=null;custDropMk=null;
}

  const mine=S.rides.filter(r=>r.createdBy===S.user.email);

  const pending=mine.find(r=>r.status==="Pending");

  // Always init map after render (even just to show pickup/dropoff)
  if(cur)setTimeout(()=>initCustMap(cur),350);

  +(cur?
    // ── Map (Bolt-style, full width) ──
    '<div style="border-radius:16px;overflow:hidden;margin-bottom:14px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.6)">'

    +'</div>'

    +'<div class="track-card" style="margin-bottom:14px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div style="font-size:15px;font-weight:700;font-family:\'Bricolage Grotesque\',sans-serif;color:'+(active?"#22c55e":"#f59e0b")+'">'+(active?"🚗 Ride In Progress":"⏳ Awaiting Driver Assignment")+'</div>'+rb(cur.status)+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">'
    +'<div style="display:flex;gap:10px;align-items:center"><div style="width:12px;height:12px;border-radius:50%;background:#22c55e;flex-shrink:0;box-shadow:0 0 6px #22c55e66"></div><div style="font-size:13px;font-weight:500">'+esc(cur.pickup||"—")+'</div></div>'
    +'<div style="width:2px;height:16px;background:linear-gradient(#22c55e,#ef4444);margin-left:5px;border-radius:2px"></div>'
    +'<div style="display:flex;gap:10px;align-items:center"><div style="width:12px;height:12px;border-radius:50%;background:#ef4444;flex-shrink:0;box-shadow:0 0 6px #ef444466"></div><div style="font-size:13px;font-weight:500">'+esc(cur.dropoff||"—")+'</div></div>'
    +'</div>'
    +(cur.driverName?
      '<div style="background:rgba(255,255,255,.05);border-radius:12px;padding:13px;margin-bottom:12px;border:1px solid rgba(139,92,246,.2)">'
      +'<div style="font-size:10px;color:#64748b;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Your Driver</div>'
      +'<div style="display:flex;align-items:center;gap:12px">'+av(cur.driverName,42,"#110a2e","#8b5cf644","#c4b5fd")
      +'<div><div style="font-size:15px;font-weight:700">'+esc(cur.driverName)+'</div>'
      +'<div style="font-size:12px;color:#8b5cf6;margin-top:2px">'+esc(cur.vehicle||"")+(cur.plate?" · <strong>"+esc(cur.plate)+"</strong>":"")+'</div></div>'
      +(cur.driverPhone?'<button class="bw" style="margin-left:auto;width:auto;padding:9px 13px;margin-bottom:0;flex-shrink:0" onclick="window.open(\'https://wa.me/\'+wa(cur.driverPhone||\"\")+\'\',\'_blank\')">💬</button>':"")
      +'</div></div>'
      :"<div style='font-size:13px;color:#f59e0b;padding:11px 14px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:10px;margin-bottom:12px'>⏳ Driver being assigned — you'll get a WhatsApp update.</div>"
    )
    +'</div>'
  :
    '<div class="card"><div style="text-align:center;padding:28px">'
    +'<div style="font-size:40px;margin-bottom:12px">📍</div>'
    +'<div style="font-size:16px;font-weight:700;font-family:\'Bricolage Grotesque\',sans-serif;margin-bottom:6px">No active ride</div>'
    +'<div style="font-size:13px;color:#94a3b8;margin-bottom:18px">Book a ride and your driver will appear here with live tracking.</div>'
    +'<button class="btnp" onclick="custGoRide()" style="background:linear-gradient(135deg,#0ea5e9,#0369a1)">Book a Ride →</button>'
    +'</div></div>'
  )
  +'<div class="pg" style="margin-top:8px">My Ride History</div>'
  +(mine.length===0?'<div class="card"><div class="em">No rides yet.</div></div>':
    mine.slice(0,6).map(r=>'<div class="card" style="padding:14px 16px;margin-bottom:9px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+rb(r.status)+'<span style="font-size:12px;color:#94a3b8">'+(r.date||"")+'</span></div>'
    +'<div style="font-size:13px;font-weight:600;margin-bottom:4px">'+esc(r.pickup||"—")+' → '+esc(r.dropoff||"—")+'</div>'
    +'<div style="font-size:12px;color:#94a3b8">🚗 '+esc(r.driverName||"Driver TBA")+(r.plate?" · "+esc(r.plate):"")+'</div>'
    +(r.fare?'<div style="font-size:15px;font-weight:700;color:#22c55e;margin-top:6px">'+fmt(r.fare)+'</div>':"")
    +'</div>').join("")
  );
}

    loadProfile();

    // Signed out — reset all state
    S.user=null;S.profile=null;S.mode="property";S.tab="Dashboard";

    S.rides=[];S.drivers=[];S.staff=[];S.auditLog=[];

    S.loginTab="staff";S.lerr="";S.lbusy=false;

    if(_availUnsub){_availUnsub();_availUnsub=null;}
    if(bkUnsub){bkUnsub();bkUnsub=null;}
    if(rdUnsub){rdUnsub();rdUnsub=null;}

});
